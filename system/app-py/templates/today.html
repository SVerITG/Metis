{% extends "base.html" %}
{% block title %}Today{% endblock %}

{% block content %}
<div class="page">

  <!-- ===== PageHead ===== -->
  <div class="page-head">
    <div>
      <div class="page-eyebrow" id="today-eyebrow"></div>
      <h1 class="page-title" id="today-title">Good morning.</h1>
    </div>
    <div class="page-meta" id="today-meta" style="white-space:pre-line;">—</div>
  </div>
  <script>
  (function() {
    const now = new Date();
    const hour = now.getHours();
    const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const dayName = days[now.getDay()];
    const month = months[now.getMonth()];
    const dateNum = now.getDate();
    const year = now.getFullYear();
    const weekNum = Math.ceil((((now - new Date(year, 0, 1)) / 86400000) + new Date(year, 0, 1).getDay() + 1) / 7);
    document.getElementById('today-eyebrow').textContent =
      dayName.toUpperCase() + ' · ' + month.toUpperCase() + ' ' + dateNum + ', ' + year + ' · WEEK ' + weekNum;
    document.getElementById('today-title').textContent = greet + ', ' + (window.METIS_USER_NAME || 'Researcher') + '.';
    const hh = String(hour).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('today-meta').textContent = hh + ':' + mm;
  })();
  </script>

  <!-- ===== Session Handoff strip ===== -->
  <div hx-get="/api/partial/today/session-handoff"
       hx-trigger="load"
       hx-swap="outerHTML"></div>

  <!-- ===== Morning Brief ===== -->
  <div hx-get="/api/partial/today/morning-brief"
       hx-trigger="load"
       hx-swap="outerHTML">
    <div class="panel panel-pad" style="padding:32px 40px;margin-bottom:28px;">
      <div style="height:18px;background:var(--m-surface-3);border-radius:2px;width:240px;margin-bottom:16px;"></div>
      <div style="height:72px;background:var(--m-surface-3);border-radius:2px;width:100%;margin-bottom:14px;"></div>
      <div style="height:32px;background:var(--m-surface-3);border-radius:2px;width:280px;"></div>
    </div>
  </div>

  <!-- ===== Ledger ===== -->
  <div hx-get="/api/partial/today/ledger"
       hx-trigger="load"
       hx-swap="outerHTML">
    <div class="ledger" style="opacity:.4;">
      <div class="ledger-cell"><div class="ledger-n tnum">—</div><div class="ledger-l">UNREAD</div></div>
      <div class="ledger-cell"><div class="ledger-n tnum">—</div><div class="ledger-l">HAT PAPERS</div></div>
      <div class="ledger-cell"><div class="ledger-n tnum">—</div><div class="ledger-l">OPEN TASKS</div></div>
      <div class="ledger-cell"><div class="ledger-n tnum">—</div><div class="ledger-l">BLOCKED</div></div>
      <div class="ledger-cell"><div class="ledger-n tnum">—</div><div class="ledger-l">IDEAS</div></div>
      <div class="ledger-cell"><div class="ledger-n tnum">—</div><div class="ledger-l">SESSIONS · 7D</div></div>
      <div class="ledger-cell"><div class="ledger-n tnum">—</div><div class="ledger-l">TOKENS · TODAY</div></div>
    </div>
  </div>

  <!-- ===== 2 × 2 Quadrant ===== -->
  <div class="today-quad">

    <!-- Row 1: Active Research · Priority Tasks -->
    <div class="grid grid-main" style="margin-bottom:32px;">

      <!-- Active Research (resume) -->
      <div hx-get="/api/partial/today/resume"
           hx-trigger="load"
           hx-swap="outerHTML">
        <div>
          <div class="sec-label" style="margin-bottom:8px;">Active Research</div>
          <div class="panel panel-pad" style="height:120px;opacity:.4;"></div>
        </div>
      </div>

      <!-- Priority Tasks -->
      <div hx-get="/api/partial/today/todos-archive"
           hx-trigger="load"
           hx-swap="outerHTML">
        <div>
          <div class="sec-label" style="margin-bottom:8px;">Priority Tasks</div>
          <div class="panel" style="height:120px;opacity:.4;"></div>
        </div>
      </div>

    </div>

    <!-- Row 2: New Science · News + Idea -->
    <div class="grid grid-main">

      <!-- New Science (library) -->
      <div hx-get="/api/partial/today/library-archive"
           hx-trigger="load"
           hx-swap="outerHTML">
        <div>
          <div class="sec-label" style="margin-bottom:8px;">New Science</div>
          <div class="panel" style="height:200px;opacity:.4;"></div>
        </div>
      </div>

      <!-- Idea + News (stacked — idea first: your thinking above external feeds) -->
      <div>
        <div hx-get="/api/partial/today/idea-today"
             hx-trigger="load"
             hx-swap="outerHTML">
          <div>
            <div class="sec-label" style="margin-bottom:8px;">Idea for today</div>
            <div class="panel" style="height:80px;opacity:.4;"></div>
          </div>
        </div>
        <div style="margin-top:20px;"
             hx-get="/api/partial/today/news-archive"
             hx-trigger="load"
             hx-swap="outerHTML">
          <div>
            <div class="sec-label" style="margin-bottom:8px;">News Radar</div>
            <div class="panel" style="height:120px;opacity:.4;"></div>
          </div>
        </div>
      </div>

    </div>

  </div><!-- /.today-quad -->

</div><!-- /.page -->

<!-- News summary modal host -->
<div id="news-modal-host"></div>
{% endblock %}
