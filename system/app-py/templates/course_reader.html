<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ course_title }} — Metis</title>
  <link rel="icon" type="image/png" href="/static/metis-icon.png">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/styles.css?v=9n">
  <link rel="stylesheet" href="/static/motion.css">
  <script src="/static/htmx.min.js"></script>
  <script>
    (function () {
      var VALID = ['archive','fieldwork','paper','observatory','midnight','cavern'];
      try {
        var t = localStorage.getItem('metis-theme');
        if (t && VALID.indexOf(t) !== -1) {
          document.documentElement.dataset.theme = (t === 'archive') ? '' : t;
        } else {
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var def = prefersDark ? 'observatory' : 'archive';
          document.documentElement.dataset.theme = (def === 'archive') ? '' : def;
        }
      } catch (e) {}
    })();
  </script>
  <style>
    body { margin: 0; background: var(--m-surface-1); }
    .reader-shell {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
    }
    .reader-sidebar {
      border-right: 1px solid var(--m-line);
      overflow-y: auto;
      background: var(--m-surface-2);
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .reader-main {
      overflow-y: auto;
      min-height: 100vh;
    }
    .reader-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      border-bottom: 1px solid var(--m-line);
      background: var(--m-surface-2);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .reader-topbar a {
      font-family: var(--m-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--m-muted);
      text-decoration: none;
    }
    .reader-topbar a:hover { color: var(--m-accent); }
    @media (max-width: 768px) {
      .reader-shell { grid-template-columns: 1fr; }
      .reader-sidebar { display: none; }
    }
  </style>
</head>
<body>
  <div class="reader-shell">
    <!-- Sidebar: course overview -->
    <div class="reader-sidebar">
      <div id="course-overview-panel"
           hx-get="/api/course/{{ slug }}/overview"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div style="padding:40px 20px;color:var(--m-muted);font-size:13px;">Loading course…</div>
      </div>
    </div>

    <!-- Main: lesson content -->
    <div class="reader-main">
      <div class="reader-topbar">
        <a href="/tab/learning">← Back to Learning</a>
        <span style="font-family:var(--m-display);font-size:14px;color:var(--m-ink);">{{ course_title }}</span>
        <span style="font-family:var(--m-mono);font-size:9px;color:var(--m-muted);">METIS READER</span>
      </div>
      <div id="lesson-reader-panel">
        <div style="padding:60px 40px;color:var(--m-muted);font-size:15px;font-family:var(--m-display);font-style:italic;max-width:600px;margin:0 auto;text-align:center;line-height:1.6;">
          Select a lesson from the sidebar to begin reading.
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
