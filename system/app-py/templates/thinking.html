{% extends "base.html" %}
{% block title %}Reflection{% endblock %}

{% block content %}
<div class="page" style="max-width:1180px;">

  <div class="page-head">
    <div>
      <div style="font-family:var(--m-mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--m-muted);margin-bottom:4px;">SURFACE 03</div>
      <h1 style="font-family:var(--m-display);font-size:34px;font-weight:500;letter-spacing:-0.025em;color:var(--m-ink);margin:0;">Reflection</h1>
    </div>
    <div class="page-meta" hx-get="/api/partial/thinking/meta" hx-trigger="load" hx-swap="innerHTML">— OPEN · LAST TOUCHED —</div>
  </div>

  <div class="thinking-layout">

    <!-- ── Left: Threads list ── -->
    <div>
      <div class="sec-label" style="margin-bottom:12px;">Open threads</div>
      <div class="panel list-scroll" id="threads-panel"
           hx-get="/api/partial/thinking/threads"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div style="padding:24px 16px;opacity:.4;font-family:var(--m-display);font-style:italic;font-size:14px;color:var(--m-muted);">Loading…</div>
      </div>
      <button class="btn btn--sec btn--caps"
              style="margin-top:12px;width:100%;justify-content:center;display:flex;align-items:center;gap:6px;"
              onclick="openCapture()">
        <svg viewBox="0 0 16 16" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="8" y1="3" x2="8" y2="13"/><line x1="3" y1="8" x2="13" y2="8"/></svg>
        New thread
      </button>
    </div>

    <!-- ── Centre: Active thread / dialogue ── -->
    <div>
      <div class="panel" style="padding:28px 36px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--m-rule);">
          <div>
            <div class="kicker kicker--accent">
              <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="5" cy="5.5" r="2.2"/><circle cx="11" cy="10.5" r="2.2"/>
                <path d="M6.2 7 C 7 8.5, 8.5 9, 9.8 9.2"/>
              </svg>
              <span>REFLECTION · ACTIVE</span>
            </div>
            <h2 style="font-family:var(--m-display);font-size:26px;font-weight:500;letter-spacing:-0.018em;color:var(--m-ink);margin:8px 0 0;">Ideas &amp; open questions</h2>
          </div>
          <span class="chip chip--sonnet chip--plain">Sonnet</span>
        </div>

        <div hx-get="/api/partial/thinking/dialogue"
             hx-trigger="load"
             hx-swap="innerHTML">
          <div style="padding:24px 0;font-family:var(--m-display);font-style:italic;font-size:15px;color:var(--m-muted);text-align:center;">Loading your threads…</div>
        </div>

        <div style="margin-top:18px;padding-top:16px;border-top:1px solid var(--m-rule);">
          <div style="background:var(--m-bg);border:1px solid var(--m-rule-strong);border-radius:2px;padding:12px 14px;display:flex;align-items:center;gap:10px;font-family:var(--m-display);font-size:15px;font-style:italic;color:var(--m-muted);cursor:text;"
               onclick="openCapture()">
            <span style="color:var(--m-accent);font-family:var(--m-mono);font-style:normal;font-size:13px;">›</span>
            <span>Capture a new idea or question…</span>
            <span style="margin-left:auto;font-family:var(--m-mono);font-style:normal;font-size:10px;letter-spacing:0.16em;color:var(--m-muted-soft);">⌘K</span>
          </div>
          <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;">
            <button class="btn btn--ghost btn--caps" onclick="openCapture('i')">Capture idea</button>
            <button class="btn btn--ghost btn--caps" onclick="launchBrainstorm()">Brainstorm</button>
            <button class="btn btn--ghost btn--caps" onclick="exportIdeaAsNote()">Export as note</button>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Right: Marginalia ── -->
    <div>
      <div class="sec-label" style="margin-bottom:12px;">Marginalia</div>
      <div hx-get="/api/partial/thinking/marginalia"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div class="panel panel-pad" style="padding:18px 20px;margin-bottom:12px;opacity:.4;">
          <div style="height:9px;background:var(--m-surface-3);border-radius:2px;width:50%;margin-bottom:8px;"></div>
          <div style="height:11px;background:var(--m-surface-3);border-radius:2px;"></div>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
