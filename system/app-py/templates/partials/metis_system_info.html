{# System info panel — Archive design system #}
<div style="padding:14px 22px;display:grid;grid-template-columns:120px 1fr;gap:8px 14px;font-family:var(--m-ui);font-size:12.5px;color:var(--m-text);">
  <div style="font-family:var(--m-mono);font-size:10px;letter-spacing:0.14em;color:var(--m-muted);text-transform:uppercase;">RC root</div>
  <div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--m-ink);" title="{{ rc_root }}">{{ rc_root }}</div>

  <div style="font-family:var(--m-mono);font-size:10px;letter-spacing:0.14em;color:var(--m-muted);text-transform:uppercase;">Database</div>
  <div>
    {% if db_size_kb %}
      <span style="font-family:var(--m-mono);color:var(--m-ink);">{{ db_size_kb }} KB</span>
    {% else %}
      <span style="color:var(--m-alert);">not found</span>
    {% endif %}
  </div>

  <div style="font-family:var(--m-mono);font-size:10px;letter-spacing:0.14em;color:var(--m-muted);text-transform:uppercase;">DB path</div>
  <div style="font-family:var(--m-mono);font-size:11px;color:var(--m-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="{{ db_path }}">{{ db_path }}</div>
</div>
