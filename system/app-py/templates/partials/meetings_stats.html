<!-- meetings_stats.html — Editorial 4-up stat row -->
<div class="grid grid-4" style="margin-bottom:24px;">
  <div class="panel panel-pad" style="padding:18px 20px;">
    <div class="todo-meta" style="margin:0 0 4px;">TOTAL MEETINGS</div>
    <div class="tnum" style="font-family:var(--m-display);font-size:28px;font-weight:500;color:var(--m-ink);line-height:1.1;">{{ total }}</div>
  </div>
  <div class="panel panel-pad" style="padding:18px 20px;">
    <div class="todo-meta" style="margin:0 0 4px;">THIS MONTH</div>
    <div class="tnum" style="font-family:var(--m-display);font-size:28px;font-weight:500;color:var(--m-info);line-height:1.1;">{{ this_month }}</div>
  </div>
  <div class="panel panel-pad" style="padding:18px 20px;">
    <div class="todo-meta" style="margin:0 0 4px;">OPEN ACTIONS</div>
    <div class="tnum" style="font-family:var(--m-display);font-size:28px;font-weight:500;color:var(--m-ochre-deep);line-height:1.1;">{{ open_actions }}</div>
  </div>
  <div class="panel panel-pad" style="padding:18px 20px;">
    <div class="todo-meta" style="margin:0 0 4px;">AVG DURATION</div>
    <div class="tnum" style="font-family:var(--m-display);font-size:28px;font-weight:500;color:var(--m-muted);line-height:1.1;">{{ avg_dur or '—' }}{% if avg_dur %}<span style="font-size:14px;">m</span>{% endif %}</div>
  </div>
</div>
