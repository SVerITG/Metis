<!-- work_hidden_projects.html — chip + inline reveal list for untracked projects -->
<div style="margin-top:14px;padding:10px 14px;background:var(--m-surface-2);border-radius:6px;border:1px solid var(--m-rule-soft);display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;">
  <span style="font-family:var(--m-mono);font-size:10px;letter-spacing:.08em;color:var(--m-muted);padding-top:2px;flex-shrink:0;">
    {{ hidden | length }} HIDDEN PROJECT{% if hidden | length != 1 %}S{% endif %}
  </span>
  <div style="display:flex;flex-wrap:wrap;gap:6px;flex:1;">
    {% for p in hidden %}
    <span style="display:inline-flex;align-items:center;gap:5px;background:var(--m-surface-3);border:1px solid var(--m-rule);border-radius:4px;padding:2px 8px 2px 10px;font-size:12px;color:var(--m-ink);">
      {{ p.title }}
      <button onclick="retrackProject('{{ p.id }}')"
              title="Show again"
              style="background:none;border:none;cursor:pointer;padding:0 2px;font-size:11px;color:var(--m-accent);line-height:1;">+ show</button>
    </span>
    {% endfor %}
  </div>
</div>
