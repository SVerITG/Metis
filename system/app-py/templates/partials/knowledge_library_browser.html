<style>
.lib-chip {
  padding: 3px 10px;
  font-family: var(--m-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1px solid var(--m-rule);
  border-radius: 2px;
  cursor: pointer;
  white-space: nowrap;
  background: var(--m-surface-2);
  color: var(--m-muted);
  transition: background 0.1s, color 0.1s;
}
.lib-chip:hover { background: var(--m-surface-3); }
.lib-chip.active { background: var(--m-accent); color: #fff; border-color: var(--m-accent); }
.lib-field-label {
  font-family: var(--m-mono);
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--m-muted);
  margin-bottom: 4px;
}
.lib-input {
  width: 100%;
  font-family: var(--m-ui);
  font-size: 13px;
  padding: 8px 12px;
  background: var(--m-surface-2);
  border: 1px solid var(--m-rule);
  border-radius: var(--m-radius);
  color: var(--m-ink);
  outline: none;
}
.lib-input:focus { border-color: var(--m-accent); }
.lib-select {
  font-family: var(--m-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  padding: 8px 10px;
  background: var(--m-surface-2);
  border: 1px solid var(--m-rule);
  border-radius: var(--m-radius);
  color: var(--m-ink);
  outline: none;
  cursor: pointer;
}
</style>

<div id="lib-browser-section">
  <div class="sec-label" style="margin-bottom:12px;">
    <span>HAT Literature Library</span>
    <span class="tail">{{ total }} PAPERS</span>
  </div>

  <div class="panel" style="overflow:hidden;">

    <!-- ── Row 1: Search + Sort ── -->
    <div style="padding:14px 20px 10px;border-bottom:1px solid var(--m-rule-soft);
                display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">

      <!-- Search bar -->
      <div style="flex:1;min-width:220px;">
        <div class="lib-field-label">Search</div>
        <input
          id="lib-q"
          name="q"
          type="search"
          placeholder="Search title, author, abstract…"
          value="{{ q }}"
          autocomplete="off"
          hx-get="/api/partial/knowledge/library-table"
          hx-trigger="keyup changed delay:350ms"
          hx-target="#lib-table-area"
          hx-swap="outerHTML"
          hx-include="#lib-hidden-fields"
          class="lib-input">
      </div>

      <!-- Sort -->
      <div style="min-width:160px;">
        <div class="lib-field-label">Sort by</div>
        <select id="lib-sort" name="sort" class="lib-select"
                onchange="_refreshLibTable()">
          <option value="newest"  {% if active_sort == 'newest'  %}selected{% endif %}>Newest first</option>
          <option value="oldest"  {% if active_sort == 'oldest'  %}selected{% endif %}>Oldest first</option>
          <option value="title"   {% if active_sort == 'title'   %}selected{% endif %}>Title A–Z</option>
          <option value="author"  {% if active_sort == 'author'  %}selected{% endif %}>Author A–Z</option>
          <option value="added"   {% if active_sort == 'added'   %}selected{% endif %}>Recently added</option>
        </select>
      </div>

      {% if active_filter_count %}
      <div style="align-self:flex-end;">
        <button onclick="clearLibFilters()"
                style="font-family:var(--m-mono);font-size:9px;letter-spacing:0.12em;
                       padding:8px 12px;background:transparent;border:1px solid var(--m-rule);
                       border-radius:2px;color:var(--m-accent);cursor:pointer;white-space:nowrap;">
          CLEAR {{ active_filter_count }} FILTER{% if active_filter_count != 1 %}S{% endif %}
        </button>
      </div>
      {% endif %}
    </div>

    <!-- ── Row 2: Item type chips ── -->
    {% if item_types %}
    <div style="padding:8px 20px;border-bottom:1px solid var(--m-rule-soft);display:flex;gap:5px;flex-wrap:wrap;align-items:center;">
      <span style="font-family:var(--m-mono);font-size:9px;letter-spacing:0.12em;color:var(--m-muted);margin-right:6px;">TYPE</span>
      <button class="lib-chip{% if not active_type %} active{% endif %}"
              data-type="" onclick="setLibType('')">All</button>
      {% for itype, count in item_types %}
      <button class="lib-chip{% if active_type == itype %} active{% endif %}"
              data-type="{{ itype | e }}" onclick="setLibType(this.dataset.type)">
        {% if itype == 'journalArticle' %}Articles
        {% elif itype == 'book' %}Books
        {% elif itype == 'report' %}Reports
        {% elif itype == 'bookSection' %}Chapters
        {% elif itype == 'preprint' %}Preprints
        {% else %}{{ itype }}{% endif %}&nbsp;<span style="opacity:.55;">({{ count }})</span>
      </button>
      {% endfor %}
    </div>
    {% endif %}

    <!-- Hidden fields carrying filter state -->
    <div id="lib-hidden-fields" style="display:none;">
      <input type="hidden" id="lib-type-hidden" name="item_type" value="{{ active_type }}">
      <input type="hidden" id="lib-sort-hidden" name="sort"      value="{{ active_sort }}">
    </div>

    <!-- ── Table area ── -->
    {% include "partials/knowledge_library_table.html" %}

  </div><!-- /.panel -->
</div><!-- /#lib-browser-section -->

<script>
function setLibType(val) {
  document.getElementById('lib-type-hidden').value = val;
  document.querySelectorAll('.lib-chip[data-type]').forEach(b => {
    b.classList.toggle('active', b.dataset.type === val);
  });
  _refreshLibTable();
}
function clearLibFilters() {
  document.getElementById('lib-q').value = '';
  document.getElementById('lib-type-hidden').value = '';
  document.querySelectorAll('.lib-chip[data-type]').forEach(b => {
    b.classList.toggle('active', b.dataset.type === '');
  });
  _refreshLibTable();
}
function _refreshLibTable() {
  var q    = document.getElementById('lib-q').value;
  var sort = document.getElementById('lib-sort').value;
  var type = document.getElementById('lib-type-hidden').value;
  document.getElementById('lib-sort-hidden').value = sort;
  htmx.ajax('GET',
    '/api/partial/knowledge/library-table?q=' + encodeURIComponent(q) +
    '&sort=' + encodeURIComponent(sort) +
    '&item_type=' + encodeURIComponent(type),
    {target: '#lib-table-area', swap: 'outerHTML'}
  );
}
</script>
