{% if items %}
<div style="margin-bottom:14px;">
  <div style="font-family:var(--m-mono);font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--m-muted);margin-bottom:8px;">Recently added</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;">
    {% for item in items %}
    <div style="display:flex;align-items:center;gap:8px;padding:5px 12px;
                background:var(--m-surface-2);border:1px solid var(--m-rule-soft);
                border-radius:100px;font-family:var(--m-display);font-size:12px;
                color:var(--m-text);white-space:nowrap;max-width:280px;overflow:hidden;">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{ item.title }}</span>
      <span style="font-family:var(--m-mono);font-size:9px;letter-spacing:0.1em;
                   color:var(--m-muted);flex-shrink:0;">{{ item.age }}</span>
    </div>
    {% endfor %}
  </div>
</div>
{% endif %}
