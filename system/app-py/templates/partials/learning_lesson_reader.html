<!-- learning_lesson_reader.html — Lesson content reader pane -->
<div style="display:flex;flex-direction:column;gap:0;height:100%;">

  <!-- Lesson nav bar -->
  <div style="display:flex;align-items:center;justify-content:space-between;
              padding:10px 20px;border-bottom:1px solid var(--m-line);
              background:var(--m-surface-2);flex-shrink:0;">
    <div style="display:flex;gap:6px;">
      {% if prev_id %}
      <button class="btn btn--ghost btn--caps" style="font-size:11px;"
              hx-get="/api/course/{{ slug }}/lesson/{{ prev_id }}"
              hx-target="#lesson-reader-panel"
              hx-swap="innerHTML">← Prev</button>
      {% endif %}
    </div>
    <div style="font-family:var(--m-mono);font-size:10px;letter-spacing:0.12em;
                color:var(--m-muted);text-align:center;">
      {{ lesson.module | upper if lesson.module else "" }}
    </div>
    <div style="display:flex;gap:6px;">
      {% if next_id %}
      <button class="btn btn--ghost btn--caps" style="font-size:11px;"
              hx-get="/api/course/{{ slug }}/lesson/{{ next_id }}"
              hx-target="#lesson-reader-panel"
              hx-swap="innerHTML">Next →</button>
      {% endif %}
    </div>
  </div>

  <!-- Lesson content -->
  <div style="padding:24px 28px;overflow-y:auto;flex:1;line-height:1.7;font-size:15px;color:var(--m-ink);">
    <div class="lesson-body">
      {{ body_html | safe }}
    </div>
  </div>

  <!-- Footer: mark complete -->
  <div style="padding:12px 20px;border-top:1px solid var(--m-line);
              background:var(--m-surface-2);flex-shrink:0;
              display:flex;align-items:center;justify-content:space-between;">
    <div style="font-size:13px;color:var(--m-muted);">
      {% if done %}<span style="color:var(--m-accent);">✓ Completed</span>{% else %}Mark when done{% endif %}
    </div>
    {% if not done %}
    <button class="btn btn--primary btn--caps" style="font-size:11px;"
            onclick="completeLesson('{{ slug }}', '{{ lesson_id }}', this)">
      Mark complete
    </button>
    {% else %}
    {% if next_id %}
    <button class="btn btn--ghost btn--caps" style="font-size:11px;"
            hx-get="/api/course/{{ slug }}/lesson/{{ next_id }}"
            hx-target="#lesson-reader-panel"
            hx-swap="innerHTML">
      Next lesson →
    </button>
    {% endif %}
    {% endif %}
  </div>

</div>

<style>
.lesson-body h1,.lesson-body h2 { font-family:var(--m-display);font-weight:500;color:var(--m-ink);margin:1.4em 0 0.5em; }
.lesson-body h2 { font-size:18px;border-bottom:1px solid var(--m-line);padding-bottom:6px; }
.lesson-body h3 { font-size:15px;font-weight:600;margin:1.2em 0 0.4em; }
.lesson-body code { font-family:var(--m-mono);font-size:12px;background:var(--m-surface-3);padding:1px 5px;border-radius:3px; }
.lesson-body pre { background:var(--m-surface-3);padding:14px 16px;border-radius:4px;overflow-x:auto;font-size:12px;line-height:1.6; }
.lesson-body pre code { background:none;padding:0; }
.lesson-body ul,
.lesson-body ol { padding-left:1.4em;margin:0.5em 0; }
.lesson-body li { margin-bottom:0.3em; }
.lesson-body blockquote { border-left:3px solid var(--m-accent);padding:6px 14px;margin:1em 0;color:var(--m-muted);font-style:italic; }
.lesson-body table { border-collapse:collapse;width:100%;font-size:13px;margin:1em 0; }
.lesson-body th { background:var(--m-surface-3);padding:6px 10px;text-align:left;font-weight:600; }
.lesson-body td { padding:6px 10px;border-bottom:1px solid var(--m-line); }
</style>
