<div id="tab-content">
  <div style="max-width:900px;margin:0 auto;padding:24px 16px;">

    <!-- Header -->
    <div style="margin-bottom:24px;">
      <h2 style="font-family:var(--m-display);font-size:20px;font-weight:700;
                 color:var(--m-ink);margin:0 0 4px;">Memory Health</h2>
      <p style="font-family:var(--m-display);font-size:12px;color:var(--m-muted);margin:0;">
        What Metis remembers — across all layers, agents, and projects.
      </p>
    </div>

    <!-- Layer overview cards -->
    <div hx-get="/api/partial/memory/overview"
         hx-trigger="load"
         hx-swap="innerHTML">
      <div style="text-align:center;padding:40px;color:var(--m-muted);font-size:12px;">
        Loading memory overview...
      </div>
    </div>

    <!-- Two-column layout for details -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px;">

      <!-- Left: Agent wisdom + Staleness -->
      <div style="display:flex;flex-direction:column;gap:20px;">

        <div style="background:var(--m-card);border-radius:8px;padding:16px;
                    border:1px solid var(--m-rule-soft);"
             hx-get="/api/partial/memory/agents"
             hx-trigger="load"
             hx-swap="innerHTML">
          <div style="text-align:center;padding:20px;color:var(--m-muted);font-size:11px;">
            Loading agent data...
          </div>
        </div>

        <div style="background:var(--m-card);border-radius:8px;padding:16px;
                    border:1px solid var(--m-rule-soft);"
             hx-get="/api/partial/memory/staleness"
             hx-trigger="load"
             hx-swap="innerHTML">
          <div style="text-align:center;padding:20px;color:var(--m-muted);font-size:11px;">
            Loading freshness data...
          </div>
        </div>

      </div>

      <!-- Right: Topic coverage -->
      <div style="background:var(--m-card);border-radius:8px;padding:16px;
                  border:1px solid var(--m-rule-soft);"
           hx-get="/api/partial/memory/topics"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div style="text-align:center;padding:20px;color:var(--m-muted);font-size:11px;">
          Loading topic data...
        </div>
      </div>

    </div>

  </div>
</div>
