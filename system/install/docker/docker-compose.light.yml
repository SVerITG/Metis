version: "3.9"

# Metis Research Cortex — MCP-only Docker Compose
#
# Quick start:
#   1. Copy .env.example to .env and fill in your API key
#   2. Edit METIS_DATA_DIR to point to your research folder
#   3. Run: docker-compose -f docker-compose.light.yml up -d
#
# Then point Claude Desktop at the container:
#   claude_desktop_config.json → "metis-rc": { "command": "docker", ... }
# (The post-install guide explains this step.)

services:

  mcp:
    build:
      context: ../../..
      dockerfile: metis/system/install/docker/Dockerfile.light
    container_name: metis-mcp-light
    restart: unless-stopped
    env_file: .env
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - METIS_RC_ROOT=/metis
    volumes:
      - ${METIS_DATA_DIR:-~/Documents/Metis}:/metis
    stdin_open: true
    tty: true
