exclusions:
  - paywall-only content with no open-access alternative (logged in paywalled.md)
  - patient-level line lists or clinic exports (Data Guardian veto)
  - non-HAT trypanosomiasis (animal AAT) unless directly relevant to vector control
safety_gates:
  - check_patient_data_exposure
  - injection_probe
notes: |
  Scope covers the operational and methodological question of sustaining surveillance
  confidence after the EPHP milestone. The 80% healthcare-seeking assumption is a
  primary vulnerability of passive-only designs — the layer is built to support
  sentinel-zone hybrid evaluations, study design reviews (Epidemiologist), and
  DHIS2 NTD module decisions.
