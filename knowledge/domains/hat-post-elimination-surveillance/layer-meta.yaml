name: hat-post-elimination-surveillance
description: >-
  Permanent specialist knowledge layer on post-elimination surveillance for human
  African trypanosomiasis (gambiense and rhodesiense HAT). Covers WHO elimination
  framework and verification, passive and integrated surveillance design after
  the EPHP milestone, sentinel/active screening hybrids, sustaining diagnostic
  capacity (RDT, CATT, LAMP, trypanolysis), vector surveillance, reactive response
  protocols, mathematical modelling of resurgence risk, DRC-specific operational
  evidence, and integration with DHIS2 NTD reporting.
owner: metis
created: 2026-05-26
last_updated: 2026-05-26
status: scoped
depth: survey
doc_count: 0
chunk_count: 0
topics:
  - WHO elimination framework HAT (EPHP, verification dossier, validation criteria)
  - post-elimination passive surveillance design and performance
  - sentinel-zone hybrid surveillance and reactive screening
  - diagnostic algorithms post-elimination (RDT, CATT, trypanolysis, LAMP, mAECT)
  - healthcare-seeking behaviour and case-detection sensitivity
  - mathematical modelling of HAT resurgence and elimination thresholds
  - tsetse vector surveillance and Tiny Targets in low-transmission settings
  - integration of HAT surveillance into DHIS2 / national NTD reporting
  - DRC-specific HAT epidemiology and programmatic evidence (PNLTHA)
  - cross-cutting NTD post-elimination surveillance (yaws, onchocerciasis, LF) as analogues
source_types:
  papers: true
  reports: true
  guidelines: true
  web: true
  preprints: false
priority_publishers:
  - WHO (Global HAT Programme, weekly epidemiological record)
  - PLoS Neglected Tropical Diseases
  - Lancet Infectious Diseases / Lancet Global Health
  - Tropical Medicine and International Health
  - Parasites & Vectors
  - BMC Infectious Diseases
  - International Journal of Health Geographics
  - PNLTHA-DRC programme reports
  - FIND, DNDi, ISG technical reports
date_range:
