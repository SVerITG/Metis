name: Tests

# Runs the Python test suite — including the automated RAG-grounding test, which
# verifies the knowledge layer retrieves the right cited source and gives a weak
# signal for fabricated questions (the core trust claim). Triggers on pushes and
# PRs that touch code/tests, plus manual runs.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'system/mcp-server/**'
      - 'system/app-py/**'
      - 'tests/**'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'system/mcp-server/**'
      - 'system/app-py/**'
      - 'tests/**'

jobs:
  pytest:
    name: pytest (incl. RAG grounding)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-nomic-v1.5-q

      - name: System libs (libsndfile for soundfile)
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Install package (with embedding + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "system/mcp-server/.[embedding,dev]"
          # The dashboard tests (tests/integration) import system/app-py/main.py,
          # which needs the dashboard deps (apscheduler, jinja2, markdown, aiofiles,
          # soundfile, …). Install them so the full suite can run in CI.
          pip install -r system/app-py/requirements.txt

      - name: Run tests
        env:
          METIS_RC_ROOT: ${{ github.workspace }}
        run: |
          # Full suite minus e2e (Playwright needs a browser harness). Tests isolate
          # via the tmp_db fixture, which now also redirects the config `paths`
          # singleton, so no test touches a real DB.
          pytest tests/ -m "not e2e" --tb=short
