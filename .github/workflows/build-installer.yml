name: Build Windows Installer

# Triggers:
#   - push of a v* tag  (e.g. git tag v1.1 && git push origin v1.1)
#   - manual run from the Actions tab (workflow_dispatch)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 1.1) — overrides the default in the .iss'
        required: false
        default: ''

jobs:
  build-installer:
    name: Compile Inno Setup installers (Full / Standard / Minimal)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          choco install innosetup --version=6.3.3 -y --no-progress
          # Verify ISCC is on PATH
          $iscc = (Get-Command ISCC.exe -ErrorAction SilentlyContinue)?.Source
          if (-not $iscc) {
            $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          }
          echo "ISCC_PATH=$iscc" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "ISCC found at: $iscc"

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) {
            # Extract from tag (v1.1 → 1.1) or fall back to 1.0
            $tag = "${{ github.ref_name }}"
            $ver = if ($tag -match '^v(.+)$') { $Matches[1] } else { "1.0" }
          }
          echo "VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Building version: $ver"

      - name: Compile — Full installer
        shell: pwsh
        run: |
          Set-Location "metis\system\install\installer"
          & "$env:ISCC_PATH" /DDefaultType=full /DMyAppVersion=$env:VERSION metis-setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Compile — Standard installer
        shell: pwsh
        run: |
          Set-Location "metis\system\install\installer"
          & "$env:ISCC_PATH" /DDefaultType=standard /DMyAppVersion=$env:VERSION metis-setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Compile — Minimal installer
        shell: pwsh
        run: |
          Set-Location "metis\system\install\installer"
          & "$env:ISCC_PATH" /DDefaultType=minimal /DMyAppVersion=$env:VERSION metis-setup.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: List compiled installers
        shell: pwsh
        run: |
          Get-ChildItem "metis\system\install\installer\dist\*.exe" |
            Select-Object Name, @{n='MB';e={[math]::Round($_.Length/1MB,1)}}

      - name: Upload Full installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetisSetup-full-${{ env.VERSION }}
          path: metis/system/install/installer/dist/MetisSetup-full-*.exe

      - name: Upload Standard installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetisSetup-standard-${{ env.VERSION }}
          path: metis/system/install/installer/dist/MetisSetup-standard-*.exe

      - name: Upload Minimal installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MetisSetup-minimal-${{ env.VERSION }}
          path: metis/system/install/installer/dist/MetisSetup-minimal-*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "Metis ${{ env.VERSION }}"
          body: |
            ## Metis Research Cortex ${{ env.VERSION }}

            ### Windows Installers

            Download the installer that matches your needs:

            | File | What it includes | Best for |
            |---|---|---|
            | `MetisSetup-full-${{ env.VERSION }}.exe` | Core + dashboard + biostatistics course | New users — recommended |
            | `MetisSetup-standard-${{ env.VERSION }}.exe` | Core + dashboard | Dashboard without extra courses |
            | `MetisSetup-minimal-${{ env.VERSION }}.exe` | Core (MCP server + agents) only | Developers, Claude Desktop only |

            All installers include the type-selection wizard — you can still change your mind during setup.

            ### Docker (no download needed)
            ```bash
            git clone https://github.com/SVerITG/Metis_PH
            cd Metis_PH/metis/system/install/docker
            cp .env.example .env   # add your API key
            docker compose up -d   # standard (dashboard + MCP)
            # or:
            docker compose -f docker-compose.light.yml up -d  # MCP only
            ```

            ### Manual / Linux
            See `metis/system/install/linux/` for shell scripts.

            ---
            Requires: Windows 10+, Python 3.10+, Anthropic API key.
            AI integration requires [Claude Desktop](https://claude.ai/download).
          files: |
            metis/system/install/installer/dist/MetisSetup-full-*.exe
            metis/system/install/installer/dist/MetisSetup-standard-*.exe
            metis/system/install/installer/dist/MetisSetup-minimal-*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
