<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 660" width="460" height="660">
<defs>
  <pattern id="rules" x="0" y="0" width="460" height="22" patternUnits="userSpaceOnUse">
    <line x1="0" y1="21.5" x2="460" y2="21.5" stroke="#1f2a24" stroke-width="0.3" opacity="0.07"/>
  </pattern>
</defs>

<!-- Background -->
<rect width="460" height="660" fill="#f5f2ea"/>
<rect width="460" height="660" fill="url(#rules)"/>

<!-- Header bar -->
<rect x="0" y="0" width="460" height="68" fill="#eee9dd"/>
<line x1="0" y1="68" x2="460" y2="68" stroke="#1f2a24" stroke-width="0.8" opacity="0.14"/>

<!-- Ochre left accent -->
<rect x="0" y="0" width="4" height="68" fill="#9a7b3c"/>

<!-- Corner marks -->
<polyline points="28,18 28,34" stroke="#9a7b3c" stroke-width="1" fill="none" opacity="0.5"/>
<polyline points="28,18 44,18" stroke="#9a7b3c" stroke-width="1" fill="none" opacity="0.5"/>
<polyline points="432,18 432,34" stroke="#9a7b3c" stroke-width="1" fill="none" opacity="0.5"/>
