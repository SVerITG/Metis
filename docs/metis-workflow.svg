<text x="80" y="569" font-family="Georgia,serif" font-size="10" fill="#7a8178" font-style="italic">Handoff brief · reflexion logged · memory updated</text>

<!-- Footer rule -->
<line x1="28" y1="596" x2="432" y2="596" stroke="#1f2a24" stroke-width="0.5" opacity="0.1"/>
<text x="230" y="619" font-family="Georgia,serif" font-size="11" fill="#9a7b3c" text-anchor="middle" font-style="italic">The more you use it, the better it knows you.</text>
<text x="230" y="640" font-family="'Courier New',monospace" font-size="7.5" fill="#b0a890" text-anchor="middle" letter-spacing="2">METIS · PUBLIC HEALTH EDITION · LOCAL · PRIVATE</text>
