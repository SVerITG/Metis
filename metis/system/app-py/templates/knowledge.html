{% extends "base.html" %}
{% block title %}Library{% endblock %}

{% block content %}
<div class="page">

  <!-- ===== PageHead ===== -->
  <div class="page-head">
    <div>
      <div class="page-eyebrow">SURFACE 02</div>
      <h1 class="page-title">Library</h1>
    </div>
    <div class="page-meta" id="knowledge-head-meta">
      <div hx-get="/api/partial/knowledge/stats-meta"
           hx-trigger="load"
           hx-swap="innerHTML">— CARDS · — SLIPCASES</div>
    </div>
  </div>

  <!-- ===== Slipcases sidebar + Index cards main ===== -->
  <div class="k-layout">

    <!-- Slipcases list -->
    <div hx-get="/api/partial/knowledge/slipcases"
         hx-trigger="load"
         hx-swap="outerHTML">
      <div>
        <div class="sec-label" style="margin-bottom:8px;">Slipcases</div>
        <div class="panel list-scroll" style="opacity:.4;min-height:180px;"></div>
      </div>
    </div>

    <!-- Index cards main area -->
    <div hx-get="/api/partial/knowledge/cards"
         hx-trigger="load"
         hx-swap="outerHTML">
      <div>
        <div class="sec-label" style="margin-bottom:8px;">Index cards</div>
        <div class="panel" style="height:320px;opacity:.4;"></div>
      </div>
    </div>

  </div>

  <!-- ===== Zotero Library browser ===== -->
  <div style="margin-top:32px;">
    <!-- Sync status bar -->
    <div id="lib-sync-bar"
         hx-get="/api/partial/knowledge/sync-status"
         hx-trigger="load"
         hx-swap="outerHTML">
      <div style="height:36px;background:var(--m-surface-2);border-radius:var(--m-radius);opacity:.4;margin-bottom:12px;"></div>
    </div>

    <!-- Browser panel -->
    <div hx-get="/api/partial/knowledge/library-browser"
         hx-trigger="load"
         hx-swap="outerHTML">
      <div>
        <div class="sec-label" style="margin-bottom:8px;"><span>Zotero Library</span></div>
        <div class="panel" style="height:200px;opacity:.4;"></div>
      </div>
    </div>
  </div>

  <!-- ===== Memory search ===== -->
  <div style="margin-top:32px;">
    <div class="sec-label" style="margin-bottom:12px;">
      <span>Memory search</span>
      <span class="tail">SEMANTIC · WHAT METIS KNOWS</span>
    </div>
    <div class="panel" style="padding:16px 20px;">
      <input type="search"
             id="memory-search-input"
             placeholder="Search what Metis has observed and learned…"
             style="width:100%;font-family:var(--m-ui);font-size:14px;padding:10px 14px;background:var(--m-surface-2);border:1px solid var(--m-rule);border-radius:var(--m-radius);color:var(--m-ink);outline:none;"
             hx-get="/api/partial/knowledge/memory-search"
             hx-trigger="keyup changed delay:400ms"
             hx-target="#memory-search-results"
             hx-include="[id='memory-search-input']"
             name="q"
             autocomplete="off">
      <div id="memory-search-results" style="margin-top:8px;min-height:40px;">
        <div style="font-family:var(--m-display);font-style:italic;font-size:13px;color:var(--m-muted);padding:12px 0;">Type to search episodic memory, observations, and reflexions.</div>
      </div>
    </div>
  </div>

</div><!-- /.page -->
{% endblock %}
