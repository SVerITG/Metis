{% extends "base.html" %}
{% block title %}Knowledge{% endblock %}

{% block content %}
<div class="page">

  <!-- ===== PageHead ===== -->
  <div class="page-head">
    <div>
      <div class="page-eyebrow">SURFACE 02</div>
      <h1 class="page-title">Knowledge</h1>
    </div>
    <div class="page-meta" id="knowledge-head-meta">
      <div hx-get="/api/partial/knowledge/stats-meta"
           hx-trigger="load"
           hx-swap="innerHTML">— CARDS · — SLIPCASES</div>
    </div>
  </div>

  <!-- ===== Slipcases sidebar + Index cards main ===== -->
  <div class="grid" style="grid-template-columns:240px 1fr;gap:32px;margin-bottom:32px;">

    <!-- Slipcases list -->
    <div hx-get="/api/partial/knowledge/slipcases"
         hx-trigger="load"
         hx-swap="outerHTML">
      <div>
        <div class="sec-label" style="margin-bottom:8px;">Slipcases</div>
        <div class="panel" style="overflow:hidden;height:320px;opacity:.4;"></div>
      </div>
    </div>

    <!-- Index cards main area -->
    <div hx-get="/api/partial/knowledge/cards"
         hx-trigger="load"
         hx-swap="outerHTML">
      <div>
        <div class="sec-label" style="margin-bottom:8px;">Index cards</div>
        <div class="panel" style="height:320px;opacity:.4;"></div>
      </div>
    </div>

  </div>

  <!-- ===== Sources: recently clipped ===== -->
  <div hx-get="/api/partial/knowledge/sources"
       hx-trigger="load"
       hx-swap="outerHTML">
    <div>
      <div class="sec-label" style="margin-bottom:8px;">Sources · recently clipped</div>
      <div class="panel" style="height:200px;opacity:.4;"></div>
    </div>
  </div>

</div><!-- /.page -->
{% endblock %}
