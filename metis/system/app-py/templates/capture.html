<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Metis Capture">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="manifest" href="/manifest.json">
  <title>Metis · Capture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #111111;
      --surface: #1c1c1e;
      --line:    rgba(255,255,255,0.1);
      --ink:     #f5f5f7;
      --muted:   #8e8e93;
      --accent:  #3b82f6;
      --ok:      #30d158;
      --alert:   #ff453a;
      --mono:    "SF Mono", "JetBrains Mono", "Fira Code", Menlo, monospace;
      --display: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--display);
      -webkit-tap-highlight-color: transparent;
    }

    .wrapper {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 12px) 20px env(safe-area-inset-bottom, 20px);
      max-width: 520px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 0 12px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 20px;
    }

    .header-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 13px;
      font-family: var(--mono);
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .prefix-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .prefix-btn {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: background 120ms, color 120ms, border-color 120ms;
      -webkit-user-select: none;
    }

    .prefix-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .input-area {
      flex: 1;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--ink);
      font-family: var(--display);
      font-size: 17px;
      line-height: 1.5;
      padding: 16px;
      resize: none;
      outline: none;
      min-height: 140px;
      transition: border-color 120ms;
    }

    .input-area:focus { border-color: var(--accent); }
    .input-area::placeholder { color: var(--muted); }

    .hint {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 8px;
      margin-bottom: 18px;
    }

    .submit-btn {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: var(--display);
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 120ms;
      margin-bottom: 12px;
    }

    .submit-btn:active { opacity: 0.75; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #result {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      min-height: 20px;
      text-align: center;
    }

    .result-ok   { color: var(--ok); }
    .result-err  { color: var(--alert); }

    .connections {
      margin-top: 20px;
      border-top: 1px solid var(--line);
      padding-top: 16px;
    }

    .connections-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .conn-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--line);
    }

    .conn-source {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--accent);
      flex-shrink: 0;
      width: 44px;
    }

    .conn-title {
      font-size: 13px;
      color: var(--ink);
      line-height: 1.3;
    }

    .dashboard-link {
      margin-top: 24px;
      text-align: center;
    }

    .dashboard-link a {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-decoration: none;
    }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header">
    <div class="header-dot"></div>
    <span class="header-title">Metis · Capture</span>
  </div>

  <div class="prefix-row" id="prefixRow">
    <button class="prefix-btn active" data-prefix="i:" onclick="setPrefix(this)">IDEA</button>
    <button class="prefix-btn" data-prefix="n:" onclick="setPrefix(this)">NOTE</button>
    <button class="prefix-btn" data-prefix="t:" onclick="setPrefix(this)">TASK</button>
    <button class="prefix-btn" data-prefix="q:" onclick="setPrefix(this)">QUESTION</button>
    <button class="prefix-btn" data-prefix="j:" onclick="setPrefix(this)">JOURNAL</button>
  </div>

  <textarea
    id="captureText"
    class="input-area"
    placeholder="What's on your mind?"
    autofocus
    rows="5"
  ></textarea>

  <p class="hint">Prefix auto-added from the type selector above.</p>

  <button class="submit-btn" id="submitBtn" onclick="submitCapture()">Save</button>

  <div id="result"></div>
  <div id="connections"></div>

  <div class="dashboard-link">
    <a href="/">Open dashboard →</a>
  </div>
</div>

<script>
  let activePrefix = "i:";

  function setPrefix(btn) {
    document.querySelectorAll(".prefix-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activePrefix = btn.dataset.prefix;
    document.getElementById("captureText").focus();
  }

  async function submitCapture() {
    const ta = document.getElementById("captureText");
    const text = ta.value.trim();
    if (!text) return;

    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Saving…";

    const fullText = activePrefix + " " + text;
    const form = new FormData();
    form.append("text", fullText);

    try {
      const res = await fetch("/api/capture", { method: "POST", body: form });
      const html = await res.text();

      // Parse connections from the response HTML
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");
      const connDiv = doc.querySelector("[style*='border-top']");

      document.getElementById("result").innerHTML =
        '<span class="result-ok">✓ SAVED</span>';

      if (connDiv) {
        const connContainer = document.getElementById("connections");
        connContainer.innerHTML = "";
        connContainer.appendChild(connDiv);
      }

      ta.value = "";
      // Re-focus for quick successive captures
      setTimeout(() => { ta.focus(); btn.disabled = false; btn.textContent = "Save"; }, 600);
    } catch (e) {
      document.getElementById("result").innerHTML =
        '<span class="result-err">ERROR — dashboard may not be running</span>';
      btn.disabled = false;
      btn.textContent = "Save";
    }
  }

  // Submit on Ctrl+Enter / Cmd+Enter
  document.getElementById("captureText").addEventListener("keydown", e => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") submitCapture();
  });
</script>
</body>
</html>
