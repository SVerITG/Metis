<!-- thinking_ideas.html — Editorial idea list -->
{% if not ideas %}
<div class="empty-row"><em>No ideas yet. Press ⌘K to capture one.</em></div>
{% else %}
<div class="panel">
  {% for idea in ideas %}
  <div class="nb-row">
    <div class="nb-when">{{ (idea.created_at or '')[:10] }} · IDEA</div>
    <div class="nb-body">{{ idea.content }}</div>
    {% if idea.tags %}
    <div class="nb-foot">
      <div style="display:flex;gap:6px;">
        {% for tag in idea.tags.split(',')[:3] %}
        <span class="chip chip--mute" style="font-size:9px;">{{ tag.strip() }}</span>
        {% endfor %}
      </div>
    </div>
    {% endif %}
  </div>
  {% endfor %}
</div>
{% endif %}
