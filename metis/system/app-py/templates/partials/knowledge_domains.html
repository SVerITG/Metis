<!-- knowledge_domains.html — Domain breakdown -->
{% if not domains %}
<div class="text-center text-muted py-4">
  <i class="bi bi-globe fs-2 mb-2 d-block"></i>
  No domains found.
</div>
{% else %}
<div class="row g-2">
  {% for d in domains %}
  <div class="col-6 col-md-4 col-lg-3">
    <div class="card p-3 text-center h-100">
      <div class="fw-bold fs-5 text-primary">{{ d.card_count }}</div>
      <div class="text-muted small text-truncate">{{ d.domain }}</div>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}
