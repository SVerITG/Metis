<!-- work_projects.html — Active project cards -->
{% if not projects %}
<div class="text-center text-muted py-4">
  <i class="bi bi-kanban fs-2 mb-2 d-block"></i>
  No active projects.
</div>
{% else %}
<div class="d-flex flex-column gap-3">
  {% for p in projects %}
  <div class="border rounded p-3">
    <div class="d-flex align-items-start justify-content-between mb-1">
      <div class="small fw-semibold">{{ p.title }}</div>
      {% if p.domain %}
      <span class="badge bg-info-subtle text-info ms-2 flex-shrink-0" style="font-size:0.65rem;">{{ p.domain }}</span>
      {% endif %}
    </div>
    {% if p.next_step %}
    <div class="text-muted small mt-1">
      <i class="bi bi-arrow-right-short me-1"></i>{{ p.next_step }}
    </div>
    {% endif %}
  </div>
  {% endfor %}
</div>
{% endif %}
