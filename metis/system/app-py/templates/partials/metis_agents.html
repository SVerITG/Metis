<!-- metis_agents.html — Registered agents list -->
{% if not agents %}
<div class="text-muted small">No agent registry found.</div>
{% else %}
<div class="d-flex flex-wrap gap-2">
  {% for a in agents %}
  <div class="d-flex align-items-center gap-2 border rounded px-2 py-1">
    <i class="bi bi-person-circle text-primary" style="font-size:0.85rem;"></i>
    <div>
      <div class="fw-semibold" style="font-size:0.78rem;">{{ a.name or a.slug or '?' }}</div>
      {% if a.role %}
      <div class="text-muted" style="font-size:0.68rem;">{{ a.role }}</div>
      {% endif %}
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}
