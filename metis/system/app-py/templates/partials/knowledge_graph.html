<!-- partials/knowledge_graph.html — Phase 5.8 knowledge graph view -->

<div class="d-flex align-items-center gap-2 mb-2">
  <span class="badge bg-secondary">{{ node_count }} notes</span>
  <span class="badge bg-primary">{{ edge_count }} links</span>
  {% if edge_count == 0 %}
  <div class="alert alert-warning py-1 px-2 mb-0 small">
    No links indexed yet. Run <code>kg_index_notes()</code> via the MCP server to build the graph.
  </div>
  {% endif %}
  <div class="ms-auto d-flex gap-2">
    <button class="btn btn-sm btn-outline-secondary" id="kg-reset-zoom">Reset zoom</button>
    <input type="text" id="kg-filter" class="form-control form-control-sm" placeholder="Filter nodes…" style="width:150px;">
  </div>
</div>

<!-- Graph canvas -->
<div id="kg-container" style="width:100%; height:520px; border:1px solid #dee2e6; border-radius:6px; background:#f8f9fa; position:relative; overflow:hidden;">
  <svg id="kg-svg" width="100%" height="100%"></svg>
  <!-- Node detail panel -->
  <div id="kg-detail" style="display:none; position:absolute; top:10px; right:10px; width:260px;
       background:white; border:1px solid #dee2e6; border-radius:6px; padding:12px; font-size:.82rem; z-index:10;">
    <button class="btn-close float-end" style="font-size:.7rem;" onclick="document.getElementById('kg-detail').style.display='none'"></button>
    <div id="kg-detail-body"></div>
  </div>
</div>

<!-- D3 v7 -->
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
(function() {
  const DOMAIN_COLORS = {
    "concepts":           "#4e8ef7",
    "disease-areas":      "#e05555",
    "methods":            "#34a853",
    "people-organizations": "#9b59b6",
    "reading-lists":      "#f39c12",
    "unknown":            "#aaa",
  };
  const NODE_RADIUS = 10;

  let allNodes = [], allLinks = [];
  let simulation, svg, g, link, node, label;
  let filterVal = "";

  async function loadGraph() {
    try {
      const resp = await fetch("/api/knowledge/graph-data");
      const data = await resp.json();
      allNodes = data.nodes;
      allLinks = data.links;
      renderGraph(allNodes, allLinks);
    } catch(e) {
      document.getElementById("kg-container").innerHTML =
        '<div class="p-3 text-danger">Failed to load graph data: ' + e + '</div>';
    }
  }

  function renderGraph(nodes, links) {
    const container = document.getElementById("kg-container");
    const W = container.clientWidth || 800;
    const H = container.clientHeight || 520;

    svg = d3.select("#kg-svg");
    svg.selectAll("*").remove();

    // Zoom/pan
    const zoom = d3.zoom().scaleExtent([0.2, 4]).on("zoom", e => g.attr("transform", e.transform));
    svg.call(zoom);

    // Reset zoom button
    document.getElementById("kg-reset-zoom").onclick = () =>
      svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);

    g = svg.append("g");

    // Build node/link maps for filtering
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    // Filter links to only those with both endpoints in current node set
    const nodeIds = new Set(nodes.map(n => n.id));
    const validLinks = links.filter(l => nodeIds.has(l.source) && nodeIds.has(l.target));

    // Clone data for D3 mutation
    const simNodes = nodes.map(d => ({...d}));
    const simLinks = validLinks.map(d => ({source: d.source, target: d.target}));

    simulation = d3.forceSimulation(simNodes)
      .force("link", d3.forceLink(simLinks).id(d => d.id).distance(90).strength(0.5))
      .force("charge", d3.forceManyBody().strength(-160))
      .force("center", d3.forceCenter(W / 2, H / 2))
      .force("collision", d3.forceCollide().radius(NODE_RADIUS + 6));

    // Links
    link = g.append("g").attr("class", "links")
      .selectAll("line").data(simLinks).join("line")
      .attr("stroke", "#ccc").attr("stroke-width", 1.5).attr("stroke-opacity", 0.7);

    // Nodes
    const nodeGroup = g.append("g").attr("class", "nodes")
      .selectAll("g").data(simNodes).join("g")
      .attr("class", "kg-node")
      .style("cursor", "pointer")
      .call(d3.drag()
        .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
        .on("drag",  (e, d) => { d.fx=e.x; d.fy=e.y; })
        .on("end",   (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
      )
      .on("click", (e, d) => showDetail(d));

    nodeGroup.append("circle")
      .attr("r", NODE_RADIUS)
      .attr("fill", d => DOMAIN_COLORS[d.domain] || "#aaa")
      .attr("stroke", "#fff").attr("stroke-width", 1.5)
      .attr("fill-opacity", 0.88);

    // Labels
    label = g.append("g").attr("class", "labels")
      .selectAll("text").data(simNodes).join("text")
      .text(d => d.title.length > 22 ? d.title.slice(0,20) + "…" : d.title)
      .attr("font-size", "9px").attr("fill", "#444")
      .attr("text-anchor", "middle").attr("dy", NODE_RADIUS + 11)
      .style("pointer-events", "none").style("user-select", "none");

    // Tick
    simulation.on("tick", () => {
      link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
          .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      nodeGroup.attr("transform", d => `translate(${d.x},${d.y})`);
      label.attr("x", d => d.x).attr("y", d => d.y);
    });

    node = nodeGroup; // store for filter

    // Legend
    const legendData = Object.entries(DOMAIN_COLORS).filter(([k]) => k !== "unknown");
    const legend = svg.append("g").attr("transform", "translate(10,10)");
    legendData.forEach(([domain, color], i) => {
      const row = legend.append("g").attr("transform", `translate(0,${i * 16})`);
      row.append("circle").attr("r", 5).attr("cx", 5).attr("cy", 0)
        .attr("fill", color).attr("fill-opacity", 0.85);
      row.append("text").attr("x", 14).attr("y", 4)
        .attr("font-size", "9px").attr("fill", "#555")
        .text(domain.replace("-", " "));
    });
  }

  function showDetail(d) {
    const panel = document.getElementById("kg-detail");
    const body = document.getElementById("kg-detail-body");
    const tagHtml = (d.tags || []).map(t =>
      `<span class="badge bg-light text-dark border me-1 mb-1" style="font-size:.7rem;">${t}</span>`
    ).join("");
    body.innerHTML = `
      <strong style="font-size:.9rem;">${d.title}</strong>
      <div class="mt-1 mb-1">
        <span class="badge" style="background:${{'concepts':'#4e8ef7','disease-areas':'#e05555','methods':'#34a853','people-organizations':'#9b59b6','reading-lists':'#f39c12'}[d.domain]||'#aaa'}; font-size:.7rem;">${d.domain}</span>
      </div>
      <div class="mb-1">${tagHtml}</div>
      <div class="text-muted" style="font-size:.72rem; word-break:break-all;">${d.id}</div>
    `;
    panel.style.display = "block";
  }

  // Filter
  document.getElementById("kg-filter").addEventListener("input", function() {
    filterVal = this.value.toLowerCase();
    if (!filterVal) {
      renderGraph(allNodes, allLinks);
      return;
    }
    const filtered = allNodes.filter(n =>
      n.title.toLowerCase().includes(filterVal) ||
      (n.tags || []).some(t => t.toLowerCase().includes(filterVal)) ||
      (n.domain || "").includes(filterVal)
    );
    renderGraph(filtered, allLinks);
  });

  loadGraph();
})();
</script>
