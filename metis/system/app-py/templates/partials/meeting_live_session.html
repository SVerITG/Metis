<div id="lm-session" style="position:fixed;top:0;left:0;right:0;bottom:0;z-index:850;background:var(--m-bg);display:flex;flex-direction:column;">

  <!-- Top bar -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid var(--m-rule-soft);background:var(--m-surface);flex-shrink:0;">
    <div style="display:flex;align-items:center;gap:14px;">
      <div id="lm-status" style="font-family:var(--m-mono);font-size:10px;letter-spacing:0.12em;color:var(--m-muted);display:flex;align-items:center;">
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--m-muted);margin-right:6px;"></span>STARTING
      </div>
      <div style="font-family:var(--m-display);font-size:16px;font-weight:500;color:var(--m-ink);">{{ title }}</div>
      <div id="lm-timer" style="font-family:var(--m-mono);font-size:12px;color:var(--m-muted);">00:00</div>
      <div id="lm-mode" style="font-family:var(--m-mono);font-size:9px;letter-spacing:0.1em;color:var(--m-muted);">detecting…</div>
    </div>
    <div style="display:flex;gap:8px;">
      <button id="lm-pause-btn" class="btn btn--ghost btn--caps" onclick="toggleLmPause()">PAUSE</button>
      <button class="btn btn--sec btn--caps" onclick="endLiveMeeting()">End Meeting</button>
      <button class="btn btn--ghost btn--caps" onclick="if(confirm('End and discard?')) closeLiveSession()">✕</button>
    </div>
  </div>

  <!-- Main two-column area -->
  <div style="display:grid;grid-template-columns:1fr 320px;flex:1;min-height:0;overflow:hidden;">

    <!-- LEFT: Transcript -->
    <div style="display:flex;flex-direction:column;border-right:1px solid var(--m-rule-soft);">
      <div style="padding:10px 20px 8px;border-bottom:1px solid var(--m-rule-soft);flex-shrink:0;">
        <span style="font-family:var(--m-mono);font-size:9px;letter-spacing:0.16em;color:var(--m-muted);">TRANSCRIPT</span>
      </div>
      <!-- Scrollable transcript body -->
      <div id="lm-transcript-body"
           style="flex:1;overflow-y:auto;padding:16px 20px;scroll-behavior:smooth;">
        <div style="font-family:var(--m-sans);font-size:13px;color:var(--m-muted);font-style:italic;">Listening… speak clearly near your microphone.</div>
      </div>
      <!-- Interim (live typing indicator) -->
      <div id="lm-interim"
           style="padding:8px 20px;border-top:1px solid var(--m-rule-soft);min-height:32px;font-family:var(--m-sans);font-size:13px;color:var(--m-muted);flex-shrink:0;background:var(--m-surface);"></div>
    </div>

    <!-- RIGHT: Connections -->
    <div style="display:flex;flex-direction:column;overflow:hidden;">
      <div style="padding:10px 16px 8px;border-bottom:1px solid var(--m-rule-soft);flex-shrink:0;">
        <span style="font-family:var(--m-mono);font-size:9px;letter-spacing:0.16em;color:var(--m-muted);">CONNECTIONS SURFACED</span>
      </div>
      <div id="lm-connections-body"
           style="flex:1;overflow-y:auto;padding:10px 16px;">
        <div style="font-family:var(--m-mono);font-size:10px;color:var(--m-muted);">Connections appear as you speak…</div>
      </div>
    </div>

  </div>

  <!-- Bottom controls bar -->
  <div style="padding:10px 20px;border-top:1px solid var(--m-rule-soft);background:var(--m-surface);display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap;">
    <div style="font-family:var(--m-mono);font-size:9px;letter-spacing:0.14em;color:var(--m-muted);">SPEAKER</div>
    <div id="lm-speaker-bar" style="display:flex;gap:6px;flex-wrap:wrap;">
      <!-- Speaker buttons injected by JS -->
    </div>
    <div id="lm-controls" style="margin-left:auto;display:flex;gap:8px;">
      <!-- End button becomes Generate Report after stop -->
    </div>
  </div>

  <!-- Report panel (hidden until generated) -->
  <div id="lm-report-panel" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;background:var(--m-bg);overflow-y:auto;z-index:10;padding:40px max(40px,5vw);">
  </div>

</div>

<style>
@keyframes lm-pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}
</style>
