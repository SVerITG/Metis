<!-- thinking_notes.html — Editorial note list -->
{% if not notes %}
<div class="empty-row"><em>No notes yet.</em></div>
{% else %}
<div class="panel">
  {% for note in notes %}
  <div class="nb-row">
    <div class="nb-when">{{ (note.created_at or '')[:10] }} · NOTE</div>
    <div class="nb-body">{{ note.content }}</div>
    {% if note.tags %}
    <div class="nb-foot">
      <div style="display:flex;gap:6px;">
        {% for tag in note.tags.split(',')[:3] %}
        <span class="chip chip--info" style="font-size:9px;">{{ tag.strip() }}</span>
        {% endfor %}
      </div>
    </div>
    {% endif %}
  </div>
  {% endfor %}
</div>
{% endif %}
