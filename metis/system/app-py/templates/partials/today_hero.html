<div class="today-hero">
  <div class="hero-greeting-block">
    <h1 class="hero-greeting">{{ greeting }}</h1>
    <p class="hero-narrative">{{ narrative }}</p>
  </div>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-value">{{ open_threads }}</div>
      <div class="hero-stat-label">Open<br>threads</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-value">{{ tokens_display }}</div>
      <div class="hero-stat-label">Tokens<br>packed</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-value">{{ gathered_display }}</div>
      <div class="hero-stat-label">Gathered<br>today</div>
    </div>
  </div>
</div>
