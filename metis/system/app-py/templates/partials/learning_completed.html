<!-- learning_completed.html — Editorial completed-courses list -->
{% if not items %}
<div class="empty-row"><em>No completed courses yet.</em></div>
{% else %}
<div class="panel">
  {% for item in items %}
  <div style="display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;padding:14px 20px;{% if not loop.last %}border-bottom:1px solid var(--m-rule-soft);{% endif %}">
    <span style="color:var(--m-ok);">
      <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 8 7 12 13 4"/>
      </svg>
    </span>
    <div>
      <div style="font-family:var(--m-display);font-size:15px;color:var(--m-ink);line-height:1.3;">{{ item.title }}</div>
      {% if item.category %}
      <div style="font-family:var(--m-mono);font-size:10px;letter-spacing:0.14em;color:var(--m-muted);text-transform:uppercase;margin-top:2px;">{{ item.category }}</div>
      {% endif %}
    </div>
    {% if item.completed_at %}
    <span class="tnum" style="font-family:var(--m-mono);font-size:10px;letter-spacing:0.14em;color:var(--m-muted);">{{ item.completed_at[:10] }}</span>
    {% endif %}
  </div>
  {% endfor %}
</div>
{% endif %}
