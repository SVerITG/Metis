<!-- learning_completed.html — Recently completed courses -->
{% if not items %}
<div class="text-center text-muted py-3">
  <i class="bi bi-mortarboard fs-3 mb-1 d-block"></i>
  <div class="small">No completed courses yet.</div>
</div>
{% else %}
<ul class="list-group list-group-flush">
  {% for item in items %}
  <li class="list-group-item px-0 py-2">
    <div class="d-flex align-items-center gap-2">
      <i class="bi bi-check-circle-fill text-success flex-shrink-0"></i>
      <div>
        <div class="small fw-semibold">{{ item.title }}</div>
        {% if item.category %}
        <div class="text-muted" style="font-size:0.72rem;">{{ item.category }}</div>
        {% endif %}
      </div>
      {% if item.completed_at %}
      <span class="ms-auto text-muted" style="font-size:0.72rem;">
        {{ item.completed_at[:10] }}
      </span>
      {% endif %}
    </div>
  </li>
  {% endfor %}
</ul>
{% endif %}
