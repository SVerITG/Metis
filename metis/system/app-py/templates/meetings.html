{% extends "base.html" %}
{% block title %}Meetings{% endblock %}

{% block extra_head %}
<script src="/static/live_meeting.js" defer></script>
{% endblock %}

{% block content %}
<div class="page">

  <div class="page-head">
    <div>
      <div style="font-family:var(--m-mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--m-muted);margin-bottom:4px;">SURFACE 06</div>
      <h1 style="font-family:var(--m-display);font-size:34px;font-weight:500;letter-spacing:-0.025em;color:var(--m-ink);margin:0;">Meetings</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
      <div class="page-meta"
           hx-get="/api/partial/meetings/meta"
           hx-trigger="load"
           hx-swap="innerHTML">— TODAY · — THIS WEEK · — TOTAL</div>
      <button class="btn btn--sec btn--caps"
              hx-get="/api/partial/meetings/import-form"
              hx-target="#meeting-import-container"
              hx-swap="innerHTML">Import Meeting</button>
      <button class="btn btn--primary btn--caps"
              onclick="startLiveMeetingSetup()">
        <svg viewBox="0 0 16 16" width="10" height="10" fill="currentColor" style="margin-right:4px;"><circle cx="8" cy="8" r="5"/></svg>
        Live Meeting
      </button>
    </div>
  </div>

  <!-- Import modal container -->
  <div id="meeting-import-container"></div>

  <div class="grid grid-main" style="gap:28px;">

    <!-- Left: upcoming + transcripts + list -->
    <div>
      <div class="sec-label" style="margin-bottom:12px;"
           hx-get="/api/partial/meetings/next-label"
           hx-trigger="load"
           hx-swap="outerHTML">
        <span>Next meeting</span>
        <span class="tail">UPCOMING</span>
      </div>

      <!-- Active meeting panel -->
      <div hx-get="/api/partial/meetings/upcoming"
           hx-trigger="load"
           hx-swap="outerHTML">
        <div class="panel" style="padding:28px 32px;margin-bottom:18px;opacity:.4;min-height:120px;"></div>
      </div>

      <!-- Meeting detail panel (appears when row is clicked) -->
      <div id="meeting-detail-panel"></div>

      <!-- Search + filter bar -->
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
        <div class="sec-label" style="margin:0;flex:1;"><span>All meetings</span></div>
        <input type="search" placeholder="Search…"
               hx-get="/api/partial/meetings/search"
               hx-trigger="keyup delay:300ms, search"
               hx-target="#meetings-list"
               hx-swap="innerHTML"
               name="q"
               style="background:var(--m-surface-2);border:1px solid var(--m-line);border-radius:4px;padding:6px 10px;font-family:var(--m-sans);font-size:13px;color:var(--m-ink);outline:none;min-width:100px;max-width:180px;flex:1;">
        <button class="btn btn--ghost btn--caps"
                hx-get="/api/partial/meetings/list?filter=week"
                hx-target="#meetings-list"
                hx-swap="innerHTML">Week</button>
        <button class="btn btn--ghost btn--caps"
                hx-get="/api/partial/meetings/list?filter=month"
                hx-target="#meetings-list"
                hx-swap="innerHTML">Month</button>
        <button class="btn btn--ghost btn--caps"
                hx-get="/api/partial/meetings/list?filter=all"
                hx-target="#meetings-list"
                hx-swap="innerHTML">All</button>
      </div>

      <!-- Meetings list -->
      <div id="meetings-list" class="list-scroll"
           hx-get="/api/partial/meetings/list"
           hx-trigger="load, refresh"
           hx-swap="innerHTML">
        <div class="panel" style="padding:20px;opacity:.4;min-height:80px;"></div>
      </div>

    </div>

    <!-- Right: week ahead + follow-ups -->
    <div>
      <div class="sec-label" style="margin-bottom:12px;"><span>Week ahead</span></div>
      <div class="panel" style="margin-bottom:18px;"
           hx-get="/api/partial/meetings/week-ahead"
           hx-trigger="load"
           hx-swap="outerHTML">
        <div style="padding:14px 18px;opacity:.4;">
          <div style="height:9px;background:var(--m-surface-3);border-radius:2px;width:50%;margin-bottom:6px;"></div>
          <div style="height:12px;background:var(--m-surface-3);border-radius:2px;width:80%;"></div>
        </div>
      </div>

      <div class="sec-label" style="margin-bottom:12px;"><span>Open follow-ups</span></div>
      <div class="panel panel-pad" style="padding:16px 20px;"
           hx-get="/api/partial/meetings/follow-ups"
           hx-trigger="load"
           hx-swap="outerHTML">
        <div class="ed" style="font-size:14px;opacity:.5;"><em>Loading…</em></div>
      </div>

      <div class="sec-label" style="margin-top:20px;margin-bottom:12px;"><span>Stats</span></div>
      <div hx-get="/api/partial/meetings/stats"
           hx-trigger="load"
           hx-swap="outerHTML">
        <div class="panel panel-pad" style="padding:18px 20px;opacity:.4;"></div>
      </div>
    </div>

  </div>
</div>

{% endblock %}
