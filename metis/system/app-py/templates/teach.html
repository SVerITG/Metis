{% extends "base.html" %}
{% block title %}Teach{% endblock %}

{% block content %}
<div class="page" style="max-width:1180px;">

  <div class="page-head">
    <div>
      <div style="font-family:var(--m-mono);font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--m-muted);margin-bottom:4px;">SURFACE 08</div>
      <h1 style="font-family:var(--m-display);font-size:34px;font-weight:500;letter-spacing:-0.025em;color:var(--m-ink);margin:0;">Teach</h1>
    </div>
    <div class="page-meta"
         hx-get="/api/partial/teach/meta"
         hx-trigger="load"
         hx-swap="innerHTML">— COURSES · — PUBLISHED · — IN PROGRESS</div>
  </div>

  <div class="grid" style="grid-template-columns:1.6fr 1fr;gap:32px;">

    <!-- Left: active course / draft panel -->
    <div>
      <div class="sec-label" style="margin-bottom:12px;"
           hx-get="/api/partial/teach/active-label"
           hx-trigger="load"
           hx-swap="outerHTML">
        <span>Active course</span>
        <span class="tail">IN PROGRESS</span>
      </div>

      <div hx-get="/api/partial/teach/active-draft"
           hx-trigger="load"
           hx-swap="outerHTML">
        <div class="panel" style="padding:40px 56px;min-height:420px;opacity:.4;">
          <div style="height:9px;background:var(--m-surface-3);border-radius:2px;width:40%;margin-bottom:24px;"></div>
          <div style="height:30px;background:var(--m-surface-3);border-radius:2px;margin-bottom:10px;"></div>
          <div style="height:16px;background:var(--m-surface-3);border-radius:2px;width:65%;margin-bottom:32px;"></div>
          <div style="height:14px;background:var(--m-surface-3);border-radius:2px;margin-bottom:10px;"></div>
          <div style="height:14px;background:var(--m-surface-3);border-radius:2px;width:90%;margin-bottom:10px;"></div>
          <div style="height:14px;background:var(--m-surface-3);border-radius:2px;width:80%;"></div>
        </div>
      </div>
    </div>

    <!-- Right: all pieces + suggested -->
    <div>
      <div class="sec-label" style="margin-bottom:12px;"><span>All courses</span></div>
      <div class="panel" style="margin-bottom:18px;"
           hx-get="/api/partial/teach/courses-list"
           hx-trigger="load"
           hx-swap="outerHTML">
        {% for _ in range(4) %}
        <div style="padding:16px 20px;{% if not loop.last %}border-bottom:1px solid var(--m-rule-soft);{% endif %}border-left:2px solid transparent;opacity:.4;">
          <div style="height:12px;background:var(--m-surface-3);border-radius:2px;margin-bottom:6px;"></div>
          <div style="height:9px;background:var(--m-surface-3);border-radius:2px;width:50%;"></div>
        </div>
        {% endfor %}
      </div>

      <div class="sec-label" style="margin-bottom:12px;"><span>Suggested next</span></div>
      <div class="panel panel-pad" style="padding:18px 20px;"
           hx-get="/api/partial/teach/suggested"
           hx-trigger="load"
           hx-swap="outerHTML">
        <div class="ed" style="font-size:14px;opacity:.5;"><em>Loading suggestions…</em></div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
