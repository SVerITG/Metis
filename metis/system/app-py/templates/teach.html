{% extends "base.html" %}
{% block title %}Teach{% endblock %}

{% block content %}

<!-- ===== Header row ===== -->
<div class="d-flex align-items-center justify-content-between mb-3">
  <div>
    <h4 class="mb-0"><i class="bi bi-easel me-2 text-primary"></i>Teach</h4>
    <div class="text-muted small mt-1">Your classes, literature alerts, and teaching tools</div>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-sm btn-outline-secondary"
            data-bs-toggle="modal"
            data-bs-target="#addCourseModal">
      <i class="bi bi-plus-lg me-1"></i>Add course
    </button>
  </div>
</div>

<!-- ===== Teach summary strip ===== -->
<div class="row g-2 mb-3">

  <div class="col-6 col-md-3">
    <div class="card p-3 text-center">
      <div class="fw-bold fs-4 text-primary" id="teach-course-count">—</div>
      <div class="text-muted small">Active courses</div>
    </div>
  </div>

  <div class="col-6 col-md-3">
    <div class="card p-3 text-center">
      <div class="fw-bold fs-4 text-warning" id="teach-lit-count">—</div>
      <div class="text-muted small">New papers this month</div>
    </div>
  </div>

  <div class="col-6 col-md-3">
    <div class="card p-3 text-center">
      <div class="fw-bold fs-4 text-danger" id="teach-news-count">—</div>
      <div class="text-muted small">News alerts this week</div>
    </div>
  </div>

  <div class="col-6 col-md-3">
    <div class="card p-3 text-center">
      <div class="fw-bold fs-4 text-success" id="teach-student-count">—</div>
      <div class="text-muted small">Students enrolled</div>
    </div>
  </div>

</div>

<!-- ===== Course cards ===== -->
<div id="teach-courses-list"
     hx-get="/api/partial/teach/courses"
     hx-trigger="load"
     hx-swap="outerHTML">
  <!-- Skeleton while loading -->
  <div class="row g-3">
    {% for _ in range(3) %}
    <div class="col-12 col-lg-6">
      <div class="card p-4 placeholder-glow">
        <span class="placeholder col-5 mb-2"></span>
        <span class="placeholder col-8 mb-1"></span>
        <span class="placeholder col-6"></span>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<!-- ===== Add Course Modal ===== -->
<div class="modal fade" id="addCourseModal" tabindex="-1" aria-labelledby="addCourseLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addCourseLabel">
          <i class="bi bi-easel me-2"></i>Add course
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <form hx-post="/api/teach/add-course"
            hx-target="#teach-courses-list"
            hx-swap="outerHTML"
            hx-on::after-request="bootstrap.Modal.getInstance(document.getElementById('addCourseModal')).hide()">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label fw-semibold">Course title *</label>
            <input type="text" name="title" class="form-control" required
                   placeholder="e.g. Epidemiology for Public Health">
          </div>
          <div class="row g-2 mb-3">
            <div class="col">
              <label class="form-label fw-semibold">Code</label>
              <input type="text" name="code" class="form-control"
                     placeholder="e.g. EPID-301">
            </div>
            <div class="col">
              <label class="form-label fw-semibold">Semester</label>
              <input type="text" name="semester" class="form-control"
                     placeholder="e.g. 2025-2026 S1">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="2"
                      placeholder="Brief course description…"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Students enrolled</label>
            <input type="number" name="student_count" class="form-control" value="0" min="0">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Add course
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
