{% extends "base.html" %}
{% block title %}Learning{% endblock %}

{% block content %}

<!-- ===== Header ===== -->
<div class="d-flex align-items-center justify-content-between mb-3">
  <div>
    <h4 class="mb-0"><i class="bi bi-mortarboard me-2 text-primary"></i>Learning</h4>
    <div class="text-muted small mt-1">Active courses, progress, and spaced repetition</div>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-sm btn-outline-secondary"
            hx-get="/api/partial/learning/due-today"
            hx-target="#learning-due-panel"
            hx-swap="innerHTML">
      <i class="bi bi-arrow-clockwise me-1"></i>Refresh due
    </button>
  </div>
</div>

<!-- ===== Due today + Progress row ===== -->
<div class="row g-3 mb-3">

  <!-- Due for review today -->
  <div class="col-12 col-md-4">
    <div class="card h-100">
      <div class="card-header py-2">
        <span class="fw-semibold small"><i class="bi bi-calendar-check me-1 text-warning"></i>Due for review today</span>
      </div>
      <div class="card-body p-3" id="learning-due-panel"
           hx-get="/api/partial/learning/due-today"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div class="placeholder-glow">
          <span class="placeholder col-8 mb-2"></span>
          <span class="placeholder col-6"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Active courses -->
  <div class="col-12 col-md-8">
    <div class="card h-100">
      <div class="card-header py-2">
        <span class="fw-semibold small"><i class="bi bi-book-half me-1 text-primary"></i>Active courses</span>
      </div>
      <div class="card-body p-3"
           hx-get="/api/partial/learning/courses"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div class="placeholder-glow">
          <span class="placeholder col-9 mb-2"></span>
          <span class="placeholder col-7 mb-2"></span>
          <span class="placeholder col-8"></span>
        </div>
      </div>
    </div>
  </div>

</div>

<!-- ===== Recently completed + Skills ===== -->
<div class="row g-3">

  <!-- Recently completed -->
  <div class="col-12 col-md-6">
    <div class="card">
      <div class="card-header py-2">
        <span class="fw-semibold small"><i class="bi bi-check2-circle me-1 text-success"></i>Recently completed</span>
      </div>
      <div class="card-body p-3"
           hx-get="/api/partial/learning/completed"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div class="placeholder-glow">
          <span class="placeholder col-8 mb-2"></span>
          <span class="placeholder col-5"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Competency map summary -->
  <div class="col-12 col-md-6">
    <div class="card">
      <div class="card-header py-2">
        <span class="fw-semibold small"><i class="bi bi-diagram-3 me-1 text-info"></i>Competencies</span>
      </div>
      <div class="card-body p-3"
           hx-get="/api/partial/learning/competencies"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div class="placeholder-glow">
          <span class="placeholder col-7 mb-2"></span>
          <span class="placeholder col-9"></span>
        </div>
      </div>
    </div>
  </div>

</div>

{% endblock %}
