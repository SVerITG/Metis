[project]
name = "metis-mcp-server"
version = "0.1.0"
description = "MCP server for the Metis research PKM"
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.0.0",
    "pyyaml>=6.0",
    "requests>=2.28",
]

[project.optional-dependencies]
webhook = [
    "fastapi>=0.110.0",
    "uvicorn[standard]>=0.29.0",
    "twilio>=9.0",
    "python-multipart>=0.0.9",
]
images = [
    "google-genai>=1.0",
]

[project.scripts]
metis-mcp = "metis_mcp.server:run"

[build-system]
requires = ["setuptools>=42"]
build-backend = "setuptools.build_meta"
