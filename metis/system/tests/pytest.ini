[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    unit: Pure unit tests — no I/O, no server
    integration: Tests using TestClient + temp SQLite
    e2e: Full round-trip tests (run with --run-e2e or -m e2e)
    wizard: Config wizard tests (audit/test_config_wizard.py)
    ux: UX surface audit tests (audit/test_ux_audit.py)
    audit: Manual UX verification checkpoints — automated where possible
    known_gap: Documents a known limitation (xfail — not a build failure)
    persona: Persona workflow regression tests
    realism: Critical realism tests — would researchers actually use this?

# Default: run unit + integration + audit; skip e2e + known_gap unless explicit
addopts = -m "not e2e and not known_gap"

# Readable output
log_cli = true
log_cli_level = WARNING
