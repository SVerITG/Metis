[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    unit: Pure unit tests — no I/O, no server
    integration: Tests using TestClient + temp SQLite
    e2e: Full round-trip tests (run with --run-e2e or -m e2e)

# Default: run unit + integration; skip e2e unless explicitly requested
addopts = -m "not e2e"

# Readable output
log_cli = true
log_cli_level = WARNING
