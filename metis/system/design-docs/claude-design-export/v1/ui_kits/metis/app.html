<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Metis · Application</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<link rel="stylesheet" href="app.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="surfaces/today.jsx"></script>
<script type="text/babel" src="surfaces/knowledge.jsx"></script>
<script type="text/babel" src="surfaces/thinking.jsx"></script>
<script type="text/babel" src="surfaces/planner.jsx"></script>
<script type="text/babel" src="surfaces/work.jsx"></script>
<script type="text/babel" src="surfaces/meetings.jsx"></script>
<script type="text/babel" src="surfaces/learning.jsx"></script>
<script type="text/babel" src="surfaces/teach.jsx"></script>
<script type="text/babel" src="surfaces/metis.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

const SURFACES = {
  today: TodaySurface,
  knowledge: KnowledgeSurface,
  thinking: ThinkingSurface,
  planner: PlannerSurface,
  work: WorkSurface,
  meetings: MeetingsSurface,
  learning: LearningSurface,
  teach: TeachSurface,
  metis: MetisSurface,
};

function App() {
  const [current, setCurrent] = useState(() => localStorage.getItem('metis.current') || 'today');
  useEffect(() => { localStorage.setItem('metis.current', current); }, [current]);

  const Surface = SURFACES[current] || TodaySurface;
  return (
    <div className="app" data-screen-label={NAV_ITEMS.findIndex(n=>n.id===current)+1 + ' ' + NAV_TITLES[current].title}>
      <Sidebar current={current} onNavigate={setCurrent}/>
      <div className="main">
        <Topbar current={current}/>
        <div className="scroll"><Surface/></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
