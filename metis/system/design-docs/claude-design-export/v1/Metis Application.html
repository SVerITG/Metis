<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Metis · Application</title>
<style>
/* === colors_and_type.css === */
/* ================================================================
   METIS DESIGN SYSTEM — Foundational Tokens
   ================================================================

   Direction: ARCHIVE (primary, light) + OBSERVATORY (dark mode).
   Editorial, research-journal tonality.

   ARCHIVE palette:
     - Bone-white paper (#fbf8f0) on warm off-white ground (#f5f2ea)
     - Forest-green ink (#2d4a3a) as primary accent
     - Muted ochre (#9a7b3c) as secondary / "alert" accent
     - Deep ink (#1f2a24) for text; stone gray-green (#7a8178) for meta

   OBSERVATORY palette (dark):
     - Warm near-black paper (#15130f) on #1c1915 surfaces
     - Amber (#d99a4c) as the single accent
     - Cream ink (#f3ead6) for text

   Typography:
     Display   → Newsreader (serif)          — hero greetings, card titles
     UI        → Inter (sans)                — body, chrome, buttons
     Mono      → JetBrains Mono              — section labels (UPPERCASE),
                                               dates, meta, code, tokens

   Voice lead: mono UPPERCASE labels with wide tracking (.14–.18em) set the
   archive/card-catalog rhythm. Serif carries the human voice.
   ================================================================ */

/* ---- Webfonts (Google Fonts) -------------------------------- */
@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* ==============================================================
     ARCHIVE — light palette (primary)
     ============================================================== */

  /* Surfaces */
  --m-bg:            #f5f2ea;   /* page / app ground — warm off-white */
  --m-surface:       #fbf8f0;   /* card / panel — bone-white paper */
  --m-surface-2:     #eee9dd;   /* sunken / inset / code block */
  --m-surface-3:     #e6e1d2;   /* deeper inset, kanban column bg */

  /* Ink (text) */
  --m-ink:           #1f2a24;   /* primary headings / high-emphasis */
  --m-text:          #2c3a33;   /* body text */
  --m-muted:         #7a8178;   /* secondary / meta / captions */
  --m-muted-soft:    #9aa098;   /* tertiary / hint */

  /* Rules & dividers */
  --m-rule:          rgba(31, 42, 36, 0.12);
  --m-rule-soft:     rgba(31, 42, 36, 0.06);
  --m-rule-strong:   rgba(31, 42, 36, 0.28);

  /* Primary accent — FOREST */
  --m-accent:        #2d4a3a;
  --m-accent-hover:  #223b2e;
  --m-accent-soft:   #4a6a54;
  --m-accent-wash:   rgba(45, 74, 58, 0.08);
  --m-accent-wash-2: rgba(45, 74, 58, 0.14);
  --m-on-accent:     #f5f2ea;

  /* Secondary accent — OCHRE */
  --m-ochre:         #9a7b3c;
  --m-ochre-deep:    #7a5f25;
  --m-ochre-soft:    #b99759;
  --m-ochre-wash:    rgba(154, 123, 60, 0.12);

  /* Semantic signals (muted, newspaper-editorial) */
  --m-ok:            #5a7a5e;   /* moss / positive */
  --m-ok-wash:       rgba(90, 122, 94, 0.14);
  --m-warn:          #9a7b3c;   /* ochre (reuse) */
  --m-warn-wash:     rgba(154, 123, 60, 0.14);
  --m-alert:         #a84632;   /* brick / destructive */
  --m-alert-wash:    rgba(168, 70, 50, 0.12);
  --m-info:          #3e6178;   /* blue-slate */
  --m-info-wash:     rgba(62, 97, 120, 0.12);

  /* Model-tier tints (Haiku/Sonnet/Opus) — warm, archive-compatible */
  --m-haiku-bg:      #e4ebd9;  --m-haiku-fg:  #3d5233;
  --m-sonnet-bg:    #dce7ec;  --m-sonnet-fg: #2d4a5e;
  --m-opus-bg:      #e8dfd2;  --m-opus-fg:   #5a3d1a;

  /* Highlighter (paper marker — for found terms, annotation) */
  --m-highlight:     rgba(217, 154, 76, 0.32);


  /* ==============================================================
     SHAPE — radii, borders, shadows
     ============================================================== */

  --m-radius:        3px;      /* cards, modals — paper edge, near-square */
  --m-radius-sm:     2px;      /* buttons, inputs, badges */
  --m-radius-xs:     2px;
  --m-radius-pill:   999px;    /* pills, chips, avatars */
  --m-radius-round:  50%;

  --m-border:        1px solid var(--m-rule);
  --m-border-strong: 1px solid var(--m-rule-strong);
  --m-border-dashed: 1px dashed var(--m-rule);

  /* Shadows — extremely subtle. Archive prefers rules over shadows. */
  --m-shadow-sm:     0 1px 0 rgba(31, 42, 36, 0.04);
  --m-shadow:        0 1px 0 rgba(31, 42, 36, 0.04), 0 4px 14px rgba(31, 42, 36, 0.05);
  --m-shadow-lg:     0 2px 0 rgba(31, 42, 36, 0.04), 0 12px 36px rgba(31, 42, 36, 0.08);
  --m-shadow-hover:  0 1px 0 rgba(31, 42, 36, 0.04), 0 6px 22px rgba(31, 42, 36, 0.08);
  --m-shadow-focus:  0 0 0 3px rgba(45, 74, 58, 0.18);


  /* ==============================================================
     SPACING — 4px base scale (also exposed as --m-s-*)
     ============================================================== */

  --m-s-1:   4px;
  --m-s-2:   8px;
  --m-s-3:   12px;
  --m-s-4:   16px;
  --m-s-5:   20px;
  --m-s-6:   24px;
  --m-s-7:   28px;
  --m-s-8:   32px;
  --m-s-10:  40px;
  --m-s-12:  48px;
  --m-s-16:  64px;
  --m-s-20:  80px;


  /* ==============================================================
     MOTION
     ============================================================== */

  --m-transition:       200ms cubic-bezier(0.4, 0, 0.2, 1);
  --m-transition-fast:  150ms ease;
  --m-transition-slow:  400ms cubic-bezier(0.6, 0.02, 0.2, 1);


  /* ==============================================================
     TYPE — families
     ============================================================== */

  --m-display: "Newsreader", "Iowan Old Style", "Palatino Linotype", Georgia, serif;
  --m-ui:      "Inter", ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
  --m-mono:    "JetBrains Mono", ui-monospace, "Menlo", "Consolas", monospace;

  /* Alias for convenience */
  --font-display: var(--m-display);
  --font-ui:      var(--m-ui);
  --font-mono:    var(--m-mono);


  /* ==============================================================
     TYPE — semantic sizes (in rem, 16px base)
     ============================================================== */

  --t-display:    2.625rem;  /* 42px — hero greeting */
  --t-h1:         1.875rem;  /* 30px — page title */
  --t-h2:         1.5rem;    /* 24px — section title (serif) */
  --t-h3:         1.25rem;   /* 20px — card title (serif) */
  --t-h4:         1.0625rem; /* 17px — subsection */
  --t-body:       0.9375rem; /* 15px — body */
  --t-body-lg:    1rem;      /* 16px — editorial body */
  --t-small:      0.8125rem; /* 13px — UI controls */
  --t-meta:       0.75rem;   /* 12px — metadata */
  --t-micro:      0.6875rem; /* 11px — UPPERCASE mono labels */

  --t-tracking-tight:    -0.015em;
  --t-tracking-hero:     -0.025em;
  --t-tracking-normal:    0;
  --t-tracking-label:     0.14em;
  --t-tracking-label-lg:  0.18em;
}


/* ================================================================
   OBSERVATORY — dark mode (opt-in via .theme-observatory OR
   [data-theme="observatory"] on an ancestor, OR prefers-color-scheme)
   ================================================================ */

.theme-observatory,
[data-theme="observatory"] {
  --m-bg:            #15130f;
  --m-surface:       #1c1915;
  --m-surface-2:     #211d18;
  --m-surface-3:     #26221c;

  --m-ink:           #f3ead6;
  --m-text:          #d9cfba;
  --m-muted:         #8a8075;
  --m-muted-soft:    #6d6458;

  --m-rule:          rgba(243, 234, 214, 0.12);
  --m-rule-soft:     rgba(243, 234, 214, 0.06);
  --m-rule-strong:   rgba(243, 234, 214, 0.28);

  --m-accent:        #d99a4c;
  --m-accent-hover:  #e5a855;
  --m-accent-soft:   #e0b07a;
  --m-accent-wash:   rgba(217, 154, 76, 0.12);
  --m-accent-wash-2: rgba(217, 154, 76, 0.22);
  --m-on-accent:     #15130f;

  --m-ochre:         #d99a4c;
  --m-ochre-deep:    #b47a30;
  --m-ochre-soft:    #e0b07a;
  --m-ochre-wash:    rgba(217, 154, 76, 0.14);

  --m-ok:            #a9c89a;
  --m-ok-wash:       rgba(169, 200, 154, 0.14);
  --m-warn:          #e0b07a;
  --m-warn-wash:     rgba(224, 176, 122, 0.14);
  --m-alert:         #e28570;
  --m-alert-wash:    rgba(226, 133, 112, 0.14);
  --m-info:          #92b3c5;
  --m-info-wash:     rgba(146, 179, 197, 0.14);

  --m-haiku-bg:      rgba(169, 200, 154, 0.18);  --m-haiku-fg:  #c3d8b6;
  --m-sonnet-bg:     rgba(146, 179, 197, 0.18);  --m-sonnet-fg: #b4cfde;
  --m-opus-bg:       rgba(224, 176, 122, 0.18);  --m-opus-fg:   #e8c79a;

  --m-highlight:     rgba(217, 154, 76, 0.28);

  --m-shadow-sm:     0 1px 0 rgba(0, 0, 0, 0.3);
  --m-shadow:        0 1px 0 rgba(0, 0, 0, 0.3), 0 4px 14px rgba(0, 0, 0, 0.35);
  --m-shadow-lg:     0 2px 0 rgba(0, 0, 0, 0.4), 0 14px 40px rgba(0, 0, 0, 0.5);
  --m-shadow-hover:  0 1px 0 rgba(0, 0, 0, 0.35), 0 10px 28px rgba(0, 0, 0, 0.45);
  --m-shadow-focus:  0 0 0 3px rgba(217, 154, 76, 0.25);
}

/* Respect the OS setting too */
@media (prefers-color-scheme: dark) {
  :root:not([data-theme="archive"]) {
    /* Repeat Observatory tokens — kept in sync with .theme-observatory */
    --m-bg:            #15130f;
    --m-surface:       #1c1915;
    --m-surface-2:     #211d18;
    --m-surface-3:     #26221c;
    --m-ink:           #f3ead6;
    --m-text:          #d9cfba;
    --m-muted:         #8a8075;
    --m-muted-soft:    #6d6458;
    --m-rule:          rgba(243, 234, 214, 0.12);
    --m-rule-soft:     rgba(243, 234, 214, 0.06);
    --m-rule-strong:   rgba(243, 234, 214, 0.28);
    --m-accent:        #d99a4c;
    --m-accent-hover:  #e5a855;
    --m-accent-soft:   #e0b07a;
    --m-accent-wash:   rgba(217, 154, 76, 0.12);
    --m-accent-wash-2: rgba(217, 154, 76, 0.22);
    --m-on-accent:     #15130f;
    --m-ochre:         #d99a4c;
    --m-ochre-deep:    #b47a30;
    --m-ochre-soft:    #e0b07a;
    --m-ochre-wash:    rgba(217, 154, 76, 0.14);
    --m-ok:            #a9c89a;
    --m-warn:          #e0b07a;
    --m-alert:         #e28570;
    --m-info:          #92b3c5;
    --m-highlight:     rgba(217, 154, 76, 0.28);
  }
}


/* ================================================================
   SEMANTIC ELEMENT DEFAULTS
   Link <html> | <body> | headings to Metis tokens. Apply
   colors_and_type.css globally for these to take effect.
   ================================================================ */

html { color-scheme: light; }
html[data-theme="observatory"] { color-scheme: dark; }

body {
  background: var(--m-bg);
  color: var(--m-text);
  font-family: var(--m-ui);
  font-size: var(--t-body);
  line-height: 1.55;
  letter-spacing: var(--t-tracking-tight);
  font-feature-settings: "ss01", "cv11", "calt";
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--m-display);
  font-weight: 500;
  color: var(--m-ink);
  line-height: 1.2;
  letter-spacing: var(--t-tracking-tight);
  margin: 0 0 var(--m-s-3);
}

h1 { font-size: var(--t-h1); font-weight: 500; letter-spacing: var(--t-tracking-hero); }
h2 { font-size: var(--t-h2); }
h3 { font-size: var(--t-h3); }
h4 { font-size: var(--t-h4); }

p { margin: 0 0 var(--m-s-3); }

a {
  color: var(--m-accent);
  text-decoration: none;
  border-bottom: 1px solid var(--m-accent-wash-2);
  transition: border-color var(--m-transition-fast), color var(--m-transition-fast);
}
a:hover { border-bottom-color: var(--m-accent); }

code, pre, kbd, samp {
  font-family: var(--m-mono);
  font-size: 0.9em;
}
pre {
  background: var(--m-surface-2);
  border: var(--m-border);
  padding: var(--m-s-4);
  border-radius: var(--m-radius);
  overflow: auto;
}
code {
  background: var(--m-surface-2);
  padding: 1px 6px;
  border-radius: var(--m-radius-sm);
  color: var(--m-accent-soft);
}
pre code { background: transparent; padding: 0; color: inherit; }

hr {
  border: 0;
  border-top: var(--m-border);
  margin: var(--m-s-6) 0;
}

::selection { background: var(--m-highlight); }


/* ================================================================
   UTILITY CLASSES
   ================================================================ */

/* Typography helpers */
.serif   { font-family: var(--m-display); }
.ui      { font-family: var(--m-ui); }
.mono    { font-family: var(--m-mono); }
.italic  { font-style: italic; }

.display { font-family: var(--m-display); font-size: var(--t-display); font-weight: 400; line-height: 1.08; letter-spacing: var(--t-tracking-hero); color: var(--m-ink); }
.display em { font-style: italic; color: var(--m-accent-soft); font-weight: 400; }

.muted       { color: var(--m-muted); }
.muted-soft  { color: var(--m-muted-soft); }
.ink         { color: var(--m-ink); }
.accent      { color: var(--m-accent); }
.ochre       { color: var(--m-ochre); }

/* UPPERCASE mono labels — the Archive rhythm-keeper */
.label-caps {
  font-family: var(--m-mono);
  font-size: var(--t-micro);
  font-weight: 500;
  letter-spacing: var(--t-tracking-label);
  text-transform: uppercase;
  color: var(--m-muted);
}
.label-caps--lg {
  font-size: var(--t-meta);
  letter-spacing: var(--t-tracking-label-lg);
}
.label-caps--ink  { color: var(--m-ink); }
.label-caps--accent { color: var(--m-accent); }

/* Sectioned label with a trailing rule */
.seclabel {
  font-family: var(--m-mono);
  font-size: var(--t-micro);
  letter-spacing: var(--t-tracking-label);
  text-transform: uppercase;
  color: var(--m-muted);
  display: flex;
  align-items: center;
  gap: var(--m-s-3);
  margin: 0 0 var(--m-s-3);
}
.seclabel::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--m-rule);
}

/* Body helpers */
.body-lg { font-size: var(--t-body-lg); line-height: 1.6; }
.small   { font-size: var(--t-small); }
.meta    { font-size: var(--t-meta); color: var(--m-muted); }

/* Tabular numerals for stats, dates, counts */
.tabular { font-variant-numeric: tabular-nums; }

/* Dividers / separators */
.rule          { border-top: var(--m-border); }
.rule-strong   { border-top: var(--m-border-strong); }
.rule-dashed   { border-top: var(--m-border-dashed); }

/* === ui_kits/metis/app.css === */
/* ==========================================================
   Metis UI Kit — application-specific styles
   Loads on top of colors_and_type.css
   ========================================================== */

html, body { height: 100%; margin: 0; background: var(--m-bg); }
body { overflow: hidden; }

/* ---- Frame ---- */
.app {
  display: grid;
  grid-template-columns: 248px 1fr;
  height: 100vh;
  min-height: 680px;
  color: var(--m-text);
  font-family: var(--m-ui);
}

/* ---- Sidebar ---- */
.side {
  background: var(--m-bg);
  border-right: 1px solid var(--m-rule);
  padding: 22px 18px 18px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  overflow-y: auto;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 6px 6px;
}
.brand svg { width: 28px; height: 28px; flex-shrink: 0; }
.brand .b-word {
  font-family: var(--m-display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
  color: var(--m-ink);
  line-height: 1;
}
.brand .b-word em { font-style: italic; color: var(--m-accent-soft); font-weight: 400; }
.brand .b-sub {
  font-family: var(--m-mono);
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--m-muted);
  margin-top: 2px;
}

.nav-sec {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.nav-sec + .nav-sec { margin-top: 12px; }
.nav-label {
  font-family: var(--m-mono);
  font-size: 9px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--m-muted-soft);
  padding: 6px 8px 4px;
  display: flex;
  justify-content: space-between;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 10px 7px 12px;
  border-radius: 2px;
  border-left: 2px solid transparent;
  font-size: 14px;
  color: var(--m-text);
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
  user-select: none;
}
.nav-item:hover { background: var(--m-accent-wash); color: var(--m-ink); }
.nav-item.active {
  background: var(--m-accent-wash);
  border-left-color: var(--m-accent);
  color: var(--m-ink);
  font-weight: 500;
}
.nav-item .n-num {
  font-family: var(--m-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--m-muted-soft);
  width: 18px;
}
.nav-item .n-label { flex: 1; }
.nav-item .n-meta {
  font-family: var(--m-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--m-muted);
}
.nav-item.active .n-num { color: var(--m-accent); }

.side-foot {
  margin-top: auto;
  padding-top: 14px;
  border-top: 1px solid var(--m-rule);
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--m-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--m-muted);
}
.side-foot .mini-ava {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--m-surface-2);
  border: 1px solid var(--m-rule);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--m-display);
  font-size: 13px;
  color: var(--m-accent);
}

/* ---- Main pane ---- */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--m-bg);
}
.topbar {
  height: 52px;
  min-height: 52px;
  padding: 0 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--m-rule);
  background: var(--m-bg);
  gap: 16px;
}
.topbar .crumbs {
  font-family: var(--m-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--m-muted);
}
.topbar .crumbs .sep { margin: 0 8px; color: var(--m-muted-soft); }
.topbar .crumbs .here { color: var(--m-ink); }
.topbar .search {
  display: flex;
  align-items: center;
  background: var(--m-surface);
  border: 1px solid var(--m-rule);
  border-radius: 2px;
  padding: 5px 10px;
  font-family: var(--m-mono);
  font-size: 12px;
  gap: 8px;
  width: 320px;
  color: var(--m-muted);
}
.topbar .search .hk {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--m-muted-soft);
  border-left: 1px solid var(--m-rule);
  padding-left: 8px;
  margin-left: auto;
}

.scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
.page {
  padding: 40px 56px 64px;
  max-width: 1280px;
  margin: 0 auto;
}

/* ---- Page headers ---- */
.page-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--m-rule-strong);
  margin-bottom: 32px;
}
.page-head .eyebrow {
  font-family: var(--m-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--m-muted);
  margin-bottom: 4px;
}
.page-head h1 {
  font-family: var(--m-display);
  font-size: 34px;
  font-weight: 500;
  letter-spacing: -0.025em;
  color: var(--m-ink);
  margin: 0;
}
.page-head h1 em { font-style: italic; color: var(--m-accent-soft); font-weight: 400; }
.page-head .page-meta {
  font-family: var(--m-mono);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--m-muted);
  text-align: right;
}

/* ---- Section header with rule ---- */
.sec-label {
  font-family: var(--m-mono);
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--m-muted);
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 0 0 16px;
}

  return (
    <div style={{ display:'inline-flex', alignItems:'center', gap:8, padding:'6px 12px', background:'var(--m-surface)', border:'1px solid var(--m-rule-strong)', borderRadius:2, fontFamily:'var(--m-ui)', fontSize:13, color:'var(--m-ink)' }}>
      <span>{value}</span>
      <Ico name="chev" />
    </div>
  );
}
window.MetisSurface = MetisSurface;


const { useState, useEffect } = React;

const SURFACES = {
  today: TodaySurface,
  knowledge: KnowledgeSurface,
  thinking: ThinkingSurface,
  planner: PlannerSurface,
  work: WorkSurface,
  meetings: MeetingsSurface,
  learning: LearningSurface,
  teach: TeachSurface,
  metis: MetisSurface,
};

function App() {
  const [current, setCurrent] = useState(() => localStorage.getItem('metis.current') || 'today');
  useEffect(() => { localStorage.setItem('metis.current', current); }, [current]);

  const Surface = SURFACES[current] || TodaySurface;
  const idx = NAV_ITEMS.findIndex(n => n.id === current) + 1;
  const title = (NAV_TITLES[current] && NAV_TITLES[current].title) || current;
  return (
    <div className="app" data-screen-label={String(idx).padStart(2,'0') + ' ' + title}>
      <Sidebar current={current} onNavigate={setCurrent}/>
      <div className="main">
        <Topbar current={current}/>
        <div className="scroll"><Surface/></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
