<!doctype html><html><head><meta charset="utf-8"><title>Shape — radii & shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 20px;width:700px;box-sizing:border-box;background:var(--metis-bg);font-family:var(--font-system)}
.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.box{background:#fff;border:1px solid var(--metis-border);padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:6px;height:100px;justify-content:center}
.lab{font-size:11px;color:var(--metis-text-muted);font-family:var(--font-mono)}
.name{font-size:12px;font-weight:600}
.shad{background:#fff;border:1px solid var(--metis-border);border-radius:12px;padding:14px 12px;text-align:center;height:100px;display:flex;flex-direction:column;justify-content:center;gap:4px}
.s1{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.s2{box-shadow:0 8px 32px rgba(0,0,0,.12)}
.s3{box-shadow:0 12px 28px rgba(23,76,79,.12)}
.s4{box-shadow:0 0 0 3px rgba(0,113,227,.15);border-color:#0071e3}
h3{font-size:12px;letter-spacing:.05em;text-transform:uppercase;color:var(--metis-text-muted);margin:0 0 6px 2px;font-weight:700}
</style></head><body>
<h3>Radii</h3>
<div class="row">
  <div class="box" style="border-radius:12px"><div class="name">card</div><div class="lab">12px</div></div>
  <div class="box" style="border-radius:8px"><div class="name">sm</div><div class="lab">8px</div></div>
  <div class="box" style="border-radius:6px"><div class="name">xs / badge</div><div class="lab">6px</div></div>
  <div class="box" style="border-radius:999px"><div class="name">pill</div><div class="lab">999px</div></div>
</div>
<h3 style="margin-top:14px">Shadows</h3>
<div class="row">
  <div class="shad s1"><div class="name">card</div><div class="lab">0 2 12 /.08</div></div>
  <div class="shad s2"><div class="name">modal</div><div class="lab">0 8 32 /.12</div></div>
  <div class="shad s3"><div class="name">warm-hover</div><div class="lab">0 12 28 teal/.12</div></div>
  <div class="shad s4"><div class="name">focus-ring</div><div class="lab">0 0 0 3 blue/.15</div></div>
</div>
</body></html>
