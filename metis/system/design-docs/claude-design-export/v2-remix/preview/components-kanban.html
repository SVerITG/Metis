<!doctype html><html><head><meta charset="utf-8"><title>Kanban</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px 20px;width:700px;box-sizing:border-box;background:var(--metis-bg);font-family:var(--font-system)}
.board{display:flex;gap:.75rem}
.col{flex:1;background:#f5f3ee;border-radius:7px;padding:.6rem;min-width:0}
.hd{font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;color:#174c4f;margin-bottom:.5rem;display:flex;justify-content:space-between}
.cnt{background:rgba(23,76,79,.15);color:#174c4f;border-radius:10px;padding:0 6px;font-size:.72rem;font-weight:700}
.card{background:#fff;border:1px solid rgba(23,76,79,.1);border-radius:5px;padding:.45rem .6rem;margin-bottom:.4rem;font-size:.82rem}
.blocked{border-left:3px solid #c0392b}
.ti{font-weight:600;line-height:1.3;margin-bottom:.2rem}
.mt{font-size:.72rem;color:#6d7c74}
</style></head><body>
<div class="board">
  <div class="col"><div class="hd"><span><i class="bi bi-moon-stars"></i> Someday</span><span class="cnt">3</span></div>
    <div class="card"><div class="ti">WHO African trypanosomiasis guideline refresh</div><div class="mt">HAT · backlog</div></div>
    <div class="card"><div class="ti">R package: hatmap</div><div class="mt">tooling</div></div>
  </div>
  <div class="col"><div class="hd"><span><i class="bi bi-hourglass-split"></i> Incubating</span><span class="cnt">2</span></div>
    <div class="card"><div class="ti">Article 2 outline</div><div class="mt">PhD · needs method</div></div>
  </div>
  <div class="col"><div class="hd"><span><i class="bi bi-lightning-charge"></i> Active</span><span class="cnt">2</span></div>
    <div class="card blocked"><div class="ti">Research Dashboard v1.1</div><div class="mt">→ finalize server layer</div></div>
    <div class="card"><div class="ti">MLM Course module 3</div><div class="mt">→ record demo</div></div>
  </div>
</div>
</body></html>
