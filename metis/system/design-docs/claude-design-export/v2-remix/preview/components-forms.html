<!doctype html><html><head><meta charset="utf-8"><title>Forms</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px 24px;width:700px;box-sizing:border-box;background:var(--metis-bg);font-family:var(--font-system)}
.fc{border:1px solid rgba(0,0,0,.1);border-radius:8px;background:rgba(255,255,255,.7);font-size:.875rem;padding:.4rem .6rem;width:100%;box-sizing:border-box;color:#1d1d1f;outline:none;font-family:inherit}
.fc:focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,.15);background:#fff}
.focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,.15);background:#fff}
.r{margin-bottom:10px}
.cap{font-size:11px;color:var(--metis-text-muted);font-family:var(--font-mono);margin-bottom:4px}
.toggle{display:inline-flex;gap:2px;background:#f2f2f7;border-radius:8px;padding:3px;width:fit-content}
.toggle .b{border:none;background:transparent;font-size:.85rem;font-weight:500;color:#6e6e73;padding:.3rem .85rem;border-radius:6px;cursor:pointer;font-family:inherit}
.toggle .b.active{background:#fff;color:#1d1d1f;box-shadow:0 1px 4px rgba(0,0,0,.1)}
</style></head><body>
<div class="r"><div class="cap">form-control (default)</div><input class="fc" placeholder="Search library…"></div>
<div class="r"><div class="cap">form-control (focus)</div><input class="fc focus" value="passive case detection"></div>
<div class="r"><div class="cap">textarea (capture)</div><textarea class="fc" rows="2" placeholder="Type your idea, note, task, or question…"></textarea></div>
<div class="r"><div class="cap">mode-toggle-bar</div><div class="toggle"><button class="b active">Kanban</button><button class="b">Timeline</button><button class="b">Strategy</button></div></div>
</body></html>
