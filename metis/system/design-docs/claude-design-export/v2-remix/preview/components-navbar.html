<!doctype html><html><head><meta charset="utf-8"><title>Navbar</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;width:700px;box-sizing:border-box;background:var(--metis-bg);font-family:var(--font-system)}
.nav{background:rgba(255,255,255,.72);backdrop-filter:saturate(180%) blur(20px);border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:.55rem .75rem;display:flex;align-items:center;gap:.75rem}
.brand{font-weight:700;font-size:1.05rem;letter-spacing:-.02em;display:flex;align-items:center;gap:4px;color:#1d1d1f}
.tabs{display:flex;gap:2px;flex-wrap:wrap}
.tab{font-size:.82rem;font-weight:500;color:#1d1d1f;border-radius:8px;padding:.35rem .7rem;background:transparent;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-family:inherit}
.tab.active,.tab:hover{background:#e8f0fe;color:#0071e3}
.right{margin-left:auto;display:flex;gap:8px;align-items:center}
.trust{display:inline-flex;gap:4px;align-items:center;font-size:.75rem;color:#6e6e73;border:1px solid rgba(0,0,0,.08);border-radius:999px;padding:3px 10px;background:#fff}
.capt{background:#0071e3;color:#fff;border:none;border-radius:999px;padding:.35rem .85rem;font-size:.82rem;font-weight:600;display:inline-flex;gap:4px;align-items:center}
</style></head><body>
<div class="nav">
  <span class="brand"><i class="bi bi-cpu-fill" style="color:#0071e3"></i>Metis</span>
  <div class="tabs">
    <button class="tab active"><i class="bi bi-sun"></i>Today</button>
    <button class="tab"><i class="bi bi-book"></i>Knowledge</button>
    <button class="tab"><i class="bi bi-lightbulb"></i>Thinking</button>
    <button class="tab"><i class="bi bi-calendar3"></i>Planner</button>
    <button class="tab"><i class="bi bi-briefcase"></i>Work</button>
    <button class="tab"><i class="bi bi-robot"></i>Metis</button>
  </div>
  <div class="right">
    <button class="capt"><i class="bi bi-plus-lg"></i>Capture</button>
    <span class="trust"><i class="bi bi-shield-check" style="color:#30a46c"></i>Local-first</span>
  </div>
</div>
</body></html>
