<!doctype html><html><head><meta charset="utf-8"><title>Metis — Warm palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px 20px;width:700px;box-sizing:border-box;background:var(--metis-bg)}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sw{border-radius:10px;padding:10px 12px;height:84px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--warm-teal-10)}
.name{font-size:12px;font-weight:600}
.hex{font-family:var(--font-mono);font-size:10.5px;opacity:.85}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#faf9f6;color:#1f2a2e"><div class="name">cream</div><div class="hex">#faf9f6</div></div>
  <div class="sw" style="background:#f6f3ec;color:#1f2a2e"><div class="name">parchment</div><div class="hex">#f6f3ec</div></div>
  <div class="sw" style="background:#fefcf8;color:#1f2a2e"><div class="name">paper</div><div class="hex">#fefcf8</div></div>
  <div class="sw" style="background:#f5f3ee;color:#1f2a2e"><div class="name">stone</div><div class="hex">#f5f3ee</div></div>
  <div class="sw" style="background:#1f2a2e;color:#faf9f6"><div class="name">ink-deep</div><div class="hex">#1f2a2e</div></div>
  <div class="sw" style="background:#174c4f;color:#fff"><div class="name">teal</div><div class="hex">#174c4f</div></div>
  <div class="sw" style="background:#2d6073;color:#fff"><div class="name">teal-2</div><div class="hex">#2d6073</div></div>
  <div class="sw" style="background:#b36a1d;color:#fff"><div class="name">amber</div><div class="hex">#b36a1d</div></div>
  <div class="sw" style="background:#2e6b4f;color:#fff"><div class="name">moss</div><div class="hex">#2e6b4f</div></div>
  <div class="sw" style="background:#c0392b;color:#fff"><div class="name">brick</div><div class="hex">#c0392b</div></div>
</div>
</body></html>
