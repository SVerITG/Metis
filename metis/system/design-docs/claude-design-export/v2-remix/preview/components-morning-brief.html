<!doctype html><html><head><meta charset="utf-8"><title>Morning brief</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@600&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px 24px;width:700px;box-sizing:border-box;background:var(--metis-bg);font-family:var(--font-system)}
.brief{border-left:4px solid #174c4f;background:linear-gradient(135deg,#f6f3ec 0%,#faf9f6 100%);border-radius:6px;padding:1rem 1.25rem}
.greet{font-family:"IBM Plex Serif",serif;font-size:1.3rem;color:#174c4f;font-weight:600;margin-bottom:.15rem}
.date{font-size:.8rem;color:#6d7c74;margin-bottom:.85rem}
.chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.85rem}
.chip{display:inline-flex;align-items:center;gap:.3em;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:600}
.ok{background:rgba(23,76,79,.12);color:#174c4f}
.warn{background:rgba(179,106,29,.15);color:#7a3d00}
.paper{border-left:3px solid #b36a1d;background:#fefcf8;padding:.5rem .75rem;border-radius:3px;font-size:.85rem}
.lab{font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;color:#b36a1d;font-weight:600;margin-bottom:.2rem}
</style></head><body>
<div class="brief">
  <div class="greet">Good morning, Sander.</div>
  <div class="date">Tuesday 21 April 2026</div>
  <div class="chips">
    <span class="chip ok"><i class="bi bi-check-circle"></i> News Radar ran</span>
    <span class="chip ok"><i class="bi bi-check-circle"></i> Librarian ran</span>
    <span class="chip warn"><i class="bi bi-exclamation-circle"></i> 2 overdue</span>
  </div>
  <div class="paper"><div class="lab">Today's paper</div>Büscher et al. — Passive surveillance sensitivity in post-elimination HAT (Lancet Glob Health, 2026)</div>
</div>
</body></html>
