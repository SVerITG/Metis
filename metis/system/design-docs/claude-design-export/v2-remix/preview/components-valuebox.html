<!doctype html><html><head><meta charset="utf-8"><title>Value boxes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 20px;width:700px;box-sizing:border-box;background:var(--metis-bg);font-family:var(--font-system)}
.strip{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem}
.box{background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.1);border-radius:12px;padding:1rem;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.lab{font-size:.78rem;text-transform:uppercase;letter-spacing:.05em;opacity:.75;color:#6e6e73;font-weight:600}
.val{font-size:1.8rem;font-weight:600;color:#1d1d1f;line-height:1.15;margin-top:2px}
.sub{font-size:.72rem;color:#6e6e73;margin-top:2px}
</style></head><body>
<div class="strip">
  <div class="box"><div class="lab">Runs today</div><div class="val">23</div><div class="sub">9 agents</div></div>
  <div class="box"><div class="lab">Tokens today</div><div class="val">412k</div><div class="sub">€2.71</div></div>
  <div class="box"><div class="lab">Open tasks</div><div class="val">8</div><div class="sub">2 overdue</div></div>
  <div class="box"><div class="lab">Active projects</div><div class="val">3</div><div class="sub">PhD · HAT · MLM</div></div>
</div>
</body></html>
