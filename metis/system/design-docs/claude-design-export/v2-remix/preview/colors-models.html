<!doctype html><html><head><meta charset="utf-8"><title>Model badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:24px;width:700px;box-sizing:border-box;background:var(--metis-bg);font-family:var(--font-system)}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.badge{border-radius:6px;padding:2px 8px;font-size:0.78rem;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.h{background:#d4f7e7;color:#1a6641}
.s{background:#dbeafe;color:#1e40af}
.o{background:#ede9fe;color:#5b21b6}
.cap{font-size:11px;color:var(--metis-text-muted);margin-right:6px}
.line{display:flex;gap:10px;align-items:center;padding:6px 0}
</style></head><body>
<div class="line"><span class="cap">Haiku</span> <span class="badge h">haiku</span> <span class="badge h">News Radar</span> <span class="badge h">Data Guardian</span></div>
<div class="line"><span class="cap">Sonnet</span> <span class="badge s">sonnet</span> <span class="badge s">Librarian</span> <span class="badge s">Writing Partner</span></div>
<div class="line"><span class="cap">Opus</span> <span class="badge o">opus</span> <span class="badge o">Software Engineer</span> <span class="badge o">PKM Builder</span></div>
</body></html>
