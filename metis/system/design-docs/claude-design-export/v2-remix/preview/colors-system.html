<!doctype html><html><head><meta charset="utf-8"><title>Metis — Primary palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:16px 20px;width:700px;box-sizing:border-box;background:var(--metis-bg)}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sw{border-radius:10px;padding:10px 12px;height:84px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--metis-border)}
.name{font-size:12px;font-weight:600}
.hex{font-family:var(--font-mono);font-size:10.5px;opacity:.8}
</style></head><body>
<div class="row">
  <div class="sw" style="background:#f5f5f7;color:#1d1d1f"><div class="name">bg</div><div class="hex">#f5f5f7</div></div>
  <div class="sw" style="background:rgba(255,255,255,.85);color:#1d1d1f"><div class="name">surface</div><div class="hex">rgba(255,255,255,.85)</div></div>
  <div class="sw" style="background:#f2f2f7;color:#1d1d1f"><div class="name">gray-light</div><div class="hex">#f2f2f7</div></div>
  <div class="sw" style="background:#1d1d1f;color:#fff"><div class="name">text</div><div class="hex">#1d1d1f</div></div>
  <div class="sw" style="background:#6e6e73;color:#fff"><div class="name">text-muted</div><div class="hex">#6e6e73</div></div>
  <div class="sw" style="background:#0071e3;color:#fff"><div class="name">blue</div><div class="hex">#0071e3</div></div>
  <div class="sw" style="background:#e8f0fe;color:#0071e3"><div class="name">blue-light</div><div class="hex">#e8f0fe</div></div>
  <div class="sw" style="background:#30a46c;color:#fff"><div class="name">green</div><div class="hex">#30a46c</div></div>
  <div class="sw" style="background:#f59f00;color:#fff"><div class="name">amber</div><div class="hex">#f59f00</div></div>
  <div class="sw" style="background:#e03131;color:#fff"><div class="name">red</div><div class="hex">#e03131</div></div>
</div>
</body></html>
