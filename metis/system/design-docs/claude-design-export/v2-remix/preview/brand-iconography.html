<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:18px 20px;width:700px;box-sizing:border-box;background:var(--metis-bg);font-family:var(--font-system)}
h3{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#6e6e73;font-weight:700;margin:0 0 6px}
.grid{display:grid;grid-template-columns:repeat(9,1fr);gap:8px;margin-bottom:12px}
.ic{border:1px solid var(--metis-border);background:#fff;border-radius:8px;padding:8px 4px;text-align:center;font-size:10px;color:#6e6e73;display:flex;flex-direction:column;align-items:center;gap:2px}
.ic i{font-size:18px;color:#1d1d1f}
.pri i{color:#0071e3}
</style></head><body>
<h3>Nav (bootstrap-icons 1.11.3)</h3>
<div class="grid">
  <div class="ic pri"><i class="bi bi-cpu-fill"></i>brand</div>
  <div class="ic"><i class="bi bi-sun"></i>Today</div>
  <div class="ic"><i class="bi bi-book"></i>Know</div>
  <div class="ic"><i class="bi bi-lightbulb"></i>Think</div>
  <div class="ic"><i class="bi bi-calendar3"></i>Plan</div>
  <div class="ic"><i class="bi bi-briefcase"></i>Work</div>
  <div class="ic"><i class="bi bi-camera-video"></i>Meet</div>
  <div class="ic"><i class="bi bi-mortarboard"></i>Learn</div>
  <div class="ic"><i class="bi bi-robot"></i>Metis</div>
</div>
<h3>Actions &amp; status</h3>
<div class="grid">
  <div class="ic"><i class="bi bi-plus-lg"></i>add</div>
  <div class="ic"><i class="bi bi-arrow-clockwise"></i>refresh</div>
  <div class="ic"><i class="bi bi-save"></i>save</div>
  <div class="ic"><i class="bi bi-search"></i>search</div>
  <div class="ic"><i class="bi bi-stars"></i>gen</div>
  <div class="ic"><i class="bi bi-shield-check"></i>safe</div>
  <div class="ic"><i class="bi bi-check2-square"></i>task</div>
  <div class="ic"><i class="bi bi-clock-history"></i>recent</div>
  <div class="ic"><i class="bi bi-diagram-3"></i>graph</div>
</div>
</body></html>
