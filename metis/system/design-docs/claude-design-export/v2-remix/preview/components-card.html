<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px 24px;width:700px;box-sizing:border-box;background:var(--metis-bg);font-family:var(--font-system)}
.card{background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.1);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);backdrop-filter:blur(20px)}
.ch{padding:.875rem 1rem;border-bottom:1px solid rgba(0,0,0,.1);font-weight:600;font-size:.9rem;display:flex;justify-content:space-between;align-items:center}
.cb{padding:1rem}
.cap{font-size:11px;color:var(--metis-text-muted);font-family:var(--font-mono);margin-bottom:6px}
.row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.85rem;border-bottom:1px solid rgba(0,0,0,.06)}
.row:last-child{border-bottom:none}
.muted{color:#6e6e73;font-size:.72rem}
</style></head><body>
<div class="cap">card · card-header · card-body</div>
<div class="card">
  <div class="ch"><span><i class="bi bi-clock-history"></i> Recent agent runs</span><span class="muted">Today</span></div>
  <div class="cb">
    <div class="row"><span class="muted" style="width:90px">14:03</span><span style="background:#e8f0fe;color:#0071e3;border-radius:6px;padding:1px 8px;font-size:.72rem;font-weight:600">librarian</span><span style="flex:1">Tagged 3 papers on passive detection</span><span class="muted">12k</span></div>
    <div class="row"><span class="muted" style="width:90px">11:47</span><span style="background:#e8f0fe;color:#0071e3;border-radius:6px;padding:1px 8px;font-size:.72rem;font-weight:600">epidemiologist</span><span style="flex:1">Reviewed Article 1 design</span><span class="muted">8.2k</span></div>
    <div class="row"><span class="muted" style="width:90px">07:02</span><span style="background:#e8f0fe;color:#0071e3;border-radius:6px;padding:1px 8px;font-size:.72rem;font-weight:600">news-radar</span><span style="flex:1">Morning brief generated</span><span class="muted">3.1k</span></div>
  </div>
</div>
</body></html>
