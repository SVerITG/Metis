{% extends "base.html" %}
{% block title %}Work{% endblock %}

{% block content %}

<!-- ===== Header ===== -->
<div class="d-flex align-items-center justify-content-between mb-3">
  <div>
    <h4 class="mb-0"><i class="bi bi-briefcase me-2 text-primary"></i>Work</h4>
    <div class="text-muted small mt-1">Tasks, projects, and work sessions</div>
  </div>
  <div class="d-flex gap-2">
    <button class="btn btn-sm btn-primary" onclick="openCapture('task')">
      <i class="bi bi-plus-lg me-1"></i>Add task
    </button>
  </div>
</div>

<!-- ===== Stats ===== -->
<div class="row g-2 mb-3"
     hx-get="/api/partial/work/stats"
     hx-trigger="load"
     hx-swap="outerHTML">
  {% for label in ['Open tasks', 'Overdue', 'Done this week', 'Active projects'] %}
  <div class="col-6 col-md-3">
    <div class="card p-3 text-center placeholder-glow">
      <span class="placeholder col-4 mx-auto mb-1" style="height:1.5rem;"></span>
      <div class="text-muted small">{{ label }}</div>
    </div>
  </div>
  {% endfor %}
</div>

<!-- ===== Tasks + Projects ===== -->
<div class="row g-3">

  <!-- Task list -->
  <div class="col-12 col-lg-6">
    <div class="card h-100">
      <div class="card-header py-2 d-flex align-items-center justify-content-between">
        <span class="fw-semibold small"><i class="bi bi-check2-square me-1"></i>Tasks</span>
        <select class="form-select form-select-sm" style="width:auto;"
                hx-get="/api/partial/work/tasks"
                hx-trigger="change"
                hx-target="#work-tasks-list"
                hx-swap="innerHTML"
                name="status">
          <option value="open" selected>Open</option>
          <option value="in_progress">In progress</option>
          <option value="done">Done</option>
          <option value="all">All</option>
        </select>
      </div>
      <div class="card-body p-0">
        <ul class="list-group list-group-flush" id="work-tasks-list"
            hx-get="/api/partial/work/tasks"
            hx-trigger="load"
            hx-swap="innerHTML"
            hx-vals='{"status": "open"}'>
          <li class="list-group-item text-center text-muted py-4">
            <div class="spinner-border spinner-border-sm me-2" role="status"></div>
            Loading tasks…
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Active projects -->
  <div class="col-12 col-lg-6">
    <div class="card h-100">
      <div class="card-header py-2">
        <span class="fw-semibold small"><i class="bi bi-kanban me-1"></i>Active projects</span>
      </div>
      <div class="card-body p-3"
           hx-get="/api/partial/work/projects"
           hx-trigger="load"
           hx-swap="innerHTML">
        <div class="placeholder-glow">
          <span class="placeholder col-8 mb-2"></span>
          <span class="placeholder col-6 mb-2"></span>
          <span class="placeholder col-7"></span>
        </div>
      </div>
    </div>
  </div>

</div>

{% endblock %}
