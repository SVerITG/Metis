<div style="position:absolute; top:20%; left:50%; transform:translateX(-50%); width:500px; max-width:90vw;">
  <div class="card shadow-lg border-secondary">
    <div class="card-header d-flex justify-content-between align-items-center">
      <strong><i class="bi bi-plus-circle me-1"></i>Quick Capture</strong>
      <button type="button" class="btn-close btn-close-white" onclick="closeCapture()"></button>
    </div>
    <div class="card-body">

      <!-- Prefix hint -->
      <div class="capture-modal-prefix-hint mb-2 small">
        <span class="badge bg-primary me-1">i:</span> idea
        <span class="badge bg-info text-dark me-1 ms-2">n:</span> note
        <span class="badge bg-warning text-dark me-1 ms-2">t:</span> task
        <span class="badge bg-secondary me-1 ms-2">q:</span> question
      </div>

      <form hx-post="/api/capture"
            hx-target="#capture-feedback"
            hx-swap="innerHTML">

        <textarea id="capture-text"
                  name="text"
                  class="form-control mb-2"
                  rows="3"
                  placeholder="Type your idea, note, task, or question…"
                  autofocus
                  required></textarea>

        <!-- Live type badge -->
        <div id="capture-type-badge" class="mb-2" style="min-height:1.6rem;"></div>

        <!-- Feedback area (success/error from POST) -->
        <div id="capture-feedback"></div>

        <div class="d-flex gap-2 mt-2">
          <button type="submit" class="btn btn-primary flex-grow-1">
            <i class="bi bi-save me-1"></i>Save
          </button>
          <button type="button" class="btn btn-outline-secondary" onclick="closeCapture()">
            Cancel
          </button>
        </div>

      </form>
    </div><!-- /.card-body -->
  </div><!-- /.card -->
</div>
