<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Metis — Today (UI kit)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
/* ================================================================
   Metis Design System — Foundational Tokens
   Extracted from system/app-py/static/styles.css (v4.0)
   ================================================================

   The Metis interface uses a DUAL palette:

   (A) macOS SYSTEM layer — primary. Clean, translucent, SF-style.
       Used for chrome, cards, forms, primary buttons.
       Colors prefixed --metis-*.

   (B) EDITORIAL WARM layer — secondary. Teal + cream + amber, with
       IBM Plex Serif accents. Used for morning briefs, kanban,
       gallery, learning hero, anything "reflective" or print-like.
       Colors prefixed --warm-*.

   The two systems coexist intentionally — macOS chrome holds editorial
   content, like a native app hosting a journal.
   ================================================================ */

:root {

  /* -------------------------------------------------------------
     (A) macOS SYSTEM — primary chrome
     ------------------------------------------------------------- */

  /* Surfaces */
  --metis-bg:           #f5f5f7;                    /* page background */
  --metis-surface:      rgba(255, 255, 255, 0.85);  /* translucent card */
  --metis-surface-2:    rgba(255, 255, 255, 0.72);  /* navbar */
  --metis-border:       rgba(0, 0, 0, 0.1);
  --metis-gray-light:   #f2f2f7;                    /* toggle track, code blocks */

  /* Accents */
  --metis-blue:         #0071e3;                    /* primary action */
  --metis-blue-hover:   #0077ed;
  --metis-blue-light:   #e8f0fe;                    /* active nav bg */
  --metis-green:        #30a46c;                    /* success / positive */
  --metis-amber:        #f59f00;                    /* warning */
  --metis-red:          #e03131;                    /* error / destructive */

  /* Text */
  --metis-text:         #1d1d1f;                    /* near-black */
  --metis-text-muted:   #6e6e73;                    /* gray / meta */
  --metis-gray:         #6e6e73;

  /* Model badge tints (flat, high-contrast) */
  --metis-haiku-bg:     #d4f7e7;  --metis-haiku-fg:  #1a6641;
  --metis-sonnet-bg:    #dbeafe;  --metis-sonnet-fg: #1e40af;
  --metis-opus-bg:      #ede9fe;  --metis-opus-fg:   #5b21b6;


  /* -------------------------------------------------------------
     (B) EDITORIAL WARM — reflective / print-like layer
     ------------------------------------------------------------- */

  --warm-bg-cream:      #faf9f6;   /* card surface / panels */
  --warm-bg-parchment:  #f6f3ec;   /* morning brief gradient start */
  --warm-bg-paper:      #fefcf8;   /* "todays paper" / network canvas */
  --warm-bg-stone:      #f5f3ee;   /* kanban column / pre blocks */

  --warm-ink-deep:      #1f2a2e;   /* primary editorial text */
  --warm-ink-slate:     #4a5a5e;   /* secondary editorial text */
  --warm-ink-muted:     #6d7c74;   /* tertiary / caption text */

  --warm-teal:          #174c4f;   /* brand teal — accents, borders */
  --warm-teal-2:        #2d6073;   /* info blue-teal */
  --warm-amber:         #b36a1d;   /* "today's paper" / surprise */
  --warm-amber-deep:    #7a3d00;
  --warm-moss:          #2e6b4f;   /* positive / signal-high */
  --warm-brick:         #c0392b;   /* alert / signal-critical */
  --warm-brick-deep:    #8b1a11;

  /* Translucent teal utilities */
  --warm-teal-08:       rgba(23, 76, 79, 0.08);
  --warm-teal-10:       rgba(23, 76, 79, 0.10);
  --warm-teal-12:       rgba(23, 76, 79, 0.12);
  --warm-teal-15:       rgba(23, 76, 79, 0.15);


  /* -------------------------------------------------------------
     SHAPE — borders, radii, shadows
     ------------------------------------------------------------- */

  --metis-radius:       12px;    /* card, button (primary) */
  --metis-radius-sm:    8px;     /* nav-link, small btn, form-control */
  --metis-radius-xs:    6px;     /* badge */
  --metis-radius-pill:  999px;   /* chips, progress bars */

  --metis-shadow:       0 2px 12px rgba(0, 0, 0, 0.08);
  --metis-shadow-lg:    0 8px 32px rgba(0, 0, 0, 0.12);
  --metis-shadow-focus: 0 0 0 3px rgba(0, 113, 227, 0.15);
  --metis-shadow-btn:   0 1px 3px rgba(0, 113, 227, 0.3);

  --warm-shadow-soft:   0 8px 20px rgba(31, 42, 46, 0.05);
  --warm-shadow-hover:  0 12px 28px rgba(23, 76, 79, 0.12);


  /* -------------------------------------------------------------
     MOTION
     ------------------------------------------------------------- */

  --metis-transition:   all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --metis-transition-fast: 150ms ease;


  /* -------------------------------------------------------------
     TYPE — families
     ------------------------------------------------------------- */

  --font-system:  -apple-system, BlinkMacSystemFont, "SF Pro Text",
                  "Inter", system-ui, sans-serif;
  --font-display: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                  "Inter", system-ui, sans-serif;
  --font-serif:   "IBM Plex Serif", Georgia, serif;
  --font-mono:    "JetBrains Mono", "Fira Code", ui-monospace,
                  SFMono-Regular, Menlo, Consolas, monospace;


  /* -------------------------------------------------------------
     TYPE — semantic scale
     ------------------------------------------------------------- */

  --type-body-size:     0.9375rem;  /* 15px — base */
  --type-body-leading:  1.6;
  --type-body-tracking: -0.01em;

  --type-h1-size:       1.75rem;    /* page-intro h1 */
  --type-h1-weight:     700;
  --type-h1-tracking:   -0.03em;

  --type-h2-size:       1.3rem;     /* morning greeting (serif) */
  --type-h2-weight:     600;
  --type-h2-tracking:   -0.02em;

  --type-h3-size:       1.15rem;    /* section header */
  --type-h4-size:       1.05rem;    /* card-title serif */

  --type-label-size:    0.78rem;    /* KPI labels, uppercased */
  --type-label-weight:  700;
  --type-label-tracking: 0.05em;

  --type-small-size:    0.875rem;   /* buttons, form-control */
  --type-meta-size:     0.78rem;    /* timestamps, tags */
  --type-micro-size:    0.72rem;    /* badges, chips */
  --type-code-size:     0.82rem;
}


/* ================================================================
   Semantic element defaults — apply these vars to real tags
   ================================================================ */

html { color-scheme: light; }

body {
  font-family: var(--font-system);
  font-size:   var(--type-body-size);
  line-height: var(--type-body-leading);
  letter-spacing: var(--type-body-tracking);
  background: var(--metis-bg);
  color: var(--metis-text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--metis-text);
}

h1 { font-size: var(--type-h1-size); font-weight: 700; letter-spacing: var(--type-h1-tracking); }
h2 { font-size: var(--type-h2-size); }
h3 { font-size: var(--type-h3-size); }
h4 { font-size: var(--type-h4-size); }

/* Editorial serif — use on .serif or explicit elements */
.serif, .morning-greeting, .sr-prompt, .gallery-card-title--serif {
  font-family: var(--font-serif);
}

code, pre, .mono {
  font-family: var(--font-mono);
  font-size: var(--type-code-size);
}

.text-muted { color: var(--metis-text-muted); }

/* Uppercase label utility (KPI captions, kanban headers, section kickers) */
.label-caps {
  text-transform: uppercase;
  letter-spacing: var(--type-label-tracking);
  font-weight: var(--type-label-weight);
  font-size: var(--type-label-size);
}

  </style>
  <style>
/* Metis Today UI kit styles — layered on top of colors_and_type.css */

.mk-page {
  min-height: 100vh;
  background: var(--metis-bg);
  color: var(--metis-text);
  font-family: var(--font-system);
  padding: 14px 18px 40px;
  box-sizing: border-box;
}

/* ---------------- Nav ---------------- */
.mk-nav {
  background: rgba(255, 255, 255, 0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border: 1px solid rgba(0, 0, 0, 0.1);
  border-radius: 12px;
  padding: .55rem .75rem;
  display: flex;
  align-items: center;
  gap: .75rem;
  margin-bottom: 14px;
}
.mk-brand {
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: -.02em;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--metis-text);
  padding-right: 8px;
  border-right: 1px solid rgba(0, 0, 0, 0.08);
  margin-right: 4px;
}
.mk-tabs { display: flex; gap: 2px; flex-wrap: wrap; }
.mk-tab {
  font-family: inherit; font-size: .82rem; font-weight: 500;
  color: var(--metis-text); background: transparent; border: none;
  border-radius: 8px; padding: .35rem .7rem; cursor: pointer;
  display: inline-flex; align-items: center; gap: 4px;
  transition: background .15s ease, color .15s ease;
}
.mk-tab:hover { background: rgba(0, 0, 0, 0.04); }
.mk-tab.active { background: #e8f0fe; color: #0071e3; }
.mk-nav-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
.mk-capture {
  background: #0071e3; color: #fff; border: none;
  border-radius: 999px; padding: .4rem 1rem; font-size: .85rem;
  font-weight: 600; display: inline-flex; gap: 6px; align-items: center;
  box-shadow: 0 2px 8px rgba(0, 113, 227, 0.35);
  cursor: pointer;
}
.mk-capture:hover { background: #005bbf; }
.mk-trust {
  display: inline-flex; gap: 4px; align-items: center;
  font-size: .75rem; color: var(--metis-text-muted);
  border: 1px solid rgba(0, 0, 0, 0.08); border-radius: 999px;
  padding: 3px 10px; background: #fff;
}

/* ---------------- Page layout ---------------- */
.mk-h1 {
  font-family: var(--font-display);
  font-size: 1.85rem; font-weight: 700; letter-spacing: -.03em;
  margin: 2px 0 12px; color: var(--metis-text);
}
.mk-grid {
  display: grid;
  grid-template-columns: 1.25fr 1fr;
  gap: 14px;
}
.mk-col { display: flex; flex-direction: column; gap: 14px; }

/* ---------------- Morning brief ---------------- */
.mk-brief {
  border-left: 4px solid #174c4f;
  background: linear-gradient(135deg, #f6f3ec 0%, #faf9f6 100%);
  border-radius: 6px;
  padding: 1.1rem 1.25rem;
}
.mk-brief-greet {
  font-family: var(--font-serif);
  font-weight: 600; font-size: 1.35rem; color: #174c4f;
  margin-bottom: .1rem;
}
.mk-brief-date { font-size: .8rem; color: #6d7c74; margin-bottom: .85rem; }
.mk-brief-chips { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: .85rem; }
.mk-chip {
  display: inline-flex; align-items: center; gap: .3em;
  padding: 3px 10px; border-radius: 20px; font-size: .78rem; font-weight: 600;
}
.mk-chip.ok { background: rgba(23, 76, 79, 0.12); color: #174c4f; }
.mk-chip.warn { background: rgba(179, 106, 29, 0.15); color: #7a3d00; }
.mk-chip.alert { background: rgba(192, 57, 43, 0.12); color: #8b1a11; }
.mk-paper {
  border-left: 3px solid #b36a1d; background: #fefcf8;
  padding: .55rem .8rem; border-radius: 3px; font-size: .88rem;
  color: var(--metis-text);
}
.mk-paper-lab {
  font-size: .72rem; text-transform: uppercase; letter-spacing: .05em;
  color: #b36a1d; font-weight: 600; margin-bottom: .25rem;
}

/* ---------------- Value boxes ---------------- */
.mk-vbs { display: grid; grid-template-columns: repeat(4, 1fr); gap: .75rem; }
.mk-vb {
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(0, 0, 0, 0.1);
  border-radius: 12px; padding: .95rem 1rem;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
}
.mk-vb-lab {
  font-size: .75rem; text-transform: uppercase; letter-spacing: .05em;
  color: var(--metis-text-muted); font-weight: 600;
}
.mk-vb-val {
  font-size: 1.8rem; font-weight: 600; color: var(--metis-text);
  line-height: 1.15; margin-top: 2px;
}
.mk-vb-sub { font-size: .72rem; color: var(--metis-text-muted); margin-top: 2px; }

/* ---------------- Card (glass) ---------------- */
.mk-card {
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(0, 0, 0, 0.1);
  border-radius: 12px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
  backdrop-filter: blur(20px);
}
.mk-card-head {
  padding: .85rem 1rem; border-bottom: 1px solid rgba(0, 0, 0, 0.1);
  font-weight: 600; font-size: .92rem;
  display: flex; justify-content: space-between; align-items: center;
}
.mk-card-body { padding: .75rem 1rem 1rem; }
.mk-muted { color: var(--metis-text-muted); font-size: .75rem; font-weight: 500; }
.mk-empty { color: var(--metis-text-muted); font-size: .85rem; padding: .5rem 0; }

/* Agent runs */
.mk-run {
  display: grid;
  grid-template-columns: 56px 120px 1fr 48px;
  align-items: center; gap: 10px;
  padding: .45rem 0; font-size: .88rem;
  border-bottom: 1px solid rgba(0, 0, 0, 0.06);
}
.mk-run:last-child { border-bottom: none; }
.mk-run-time { color: var(--metis-text-muted); font-size: .78rem; font-family: var(--font-mono); }
.mk-run-text { color: var(--metis-text); }
.mk-run-tokens { color: var(--metis-text-muted); font-size: .78rem; text-align: right; font-family: var(--font-mono); }

.mk-agent-badge {
  border-radius: 6px; padding: 2px 8px; font-size: .72rem;
  font-weight: 600; text-align: center;
}
.mk-agent-badge.h { background: #d4f7e7; color: #1a6641; }   /* haiku */
.mk-agent-badge.s { background: #dbeafe; color: #1e40af; }   /* sonnet */
.mk-agent-badge.o { background: #ede9fe; color: #5b21b6; }   /* opus */

/* Inbox */
.mk-inbox-row {
  display: grid;
  grid-template-columns: 64px 110px 1fr 72px;
  align-items: center; gap: 10px;
  padding: .45rem 0; font-size: .88rem;
  border-bottom: 1px solid rgba(0, 0, 0, 0.06);
}
.mk-inbox-row:last-child { border-bottom: none; }
.mk-inbox-from { color: var(--metis-text-muted); font-size: .78rem; font-family: var(--font-mono); }
.mk-inbox-text { color: var(--metis-text); }
.sig-high { color: #fff; background: #2e6b4f; padding: 2px 7px; border-radius: 3px; font-size: .72rem; font-weight: 700; text-align: center; }
.sig-med  { color: #fff; background: #b36a1d; padding: 2px 7px; border-radius: 3px; font-size: .72rem; font-weight: 700; text-align: center; }
.sig-low  { color: #fff; background: #6d7c74; padding: 2px 7px; border-radius: 3px; font-size: .72rem; font-weight: 700; text-align: center; }

.mk-btn-xs {
  padding: 2px 8px; font-size: .72rem; border-radius: 4px;
  background: transparent; border: 1px solid rgba(0, 0, 0, 0.1);
  color: var(--metis-text); font-family: inherit; cursor: pointer;
}
.mk-btn-xs:hover { background: rgba(0, 0, 0, 0.04); }

.mk-btn-primary {
  background: #0071e3; color: #fff; border: 1px solid #0071e3;
  border-radius: 8px; padding: .4rem .9rem; font-size: .85rem;
  font-weight: 500; cursor: pointer; display: inline-flex; gap: 6px; align-items: center;
  font-family: inherit;
  box-shadow: 0 1px 3px rgba(0, 113, 227, 0.3);
}
.mk-btn-primary:hover { background: #005bbf; }

/* ---------------- Capture bar ---------------- */
.mk-capture-bar {
  background: rgba(255, 255, 255, 0.85);
  border: 1px solid rgba(0, 0, 0, 0.1);
  border-radius: 12px;
  padding: .9rem 1rem;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
}
.mk-capture-modes { display: flex; gap: 2px; background: #f2f2f7; border-radius: 8px; padding: 3px; width: fit-content; margin-bottom: .6rem; }
.mk-mode {
  border: none; background: transparent; font-size: .82rem; font-weight: 500;
  color: var(--metis-text-muted); padding: .3rem .75rem; border-radius: 6px;
  cursor: pointer; font-family: inherit;
  display: inline-flex; gap: 5px; align-items: center;
}
.mk-mode.active { background: #fff; color: var(--metis-text); box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1); }
.mk-capture-input textarea {
  width: 100%; box-sizing: border-box;
  border: 1px solid rgba(0, 0, 0, 0.1); border-radius: 8px;
  background: rgba(255, 255, 255, 0.7); font-size: .9rem;
  padding: .5rem .65rem; color: var(--metis-text);
  font-family: inherit; resize: vertical; outline: none;
}
.mk-capture-input textarea:focus {
  border-color: #0071e3; box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15); background: #fff;
}
.mk-capture-foot { display: flex; align-items: center; justify-content: space-between; margin-top: .5rem; }

/* ---------------- Kanban ---------------- */
.mk-kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: .75rem; }
.mk-kan-col {
  background: #f5f3ee; border-radius: 7px; padding: .6rem; min-width: 0;
}
.mk-kan-hd {
  font-weight: 700; font-size: .78rem; text-transform: uppercase;
  letter-spacing: .05em; color: #174c4f;
  margin-bottom: .5rem; display: flex; justify-content: space-between; align-items: center;
}
.mk-kan-count {
  background: rgba(23, 76, 79, 0.15); color: #174c4f; border-radius: 10px;
  padding: 0 7px; font-size: .72rem; font-weight: 700;
}
.mk-kan-card {
  background: #fff; border: 1px solid rgba(23, 76, 79, 0.1); border-radius: 5px;
  padding: .5rem .65rem; margin-bottom: .4rem; font-size: .84rem;
  cursor: pointer; transition: transform .15s ease, box-shadow .15s ease;
}
.mk-kan-card:hover { transform: translateY(-1px); box-shadow: 0 12px 28px rgba(23, 76, 79, 0.12); }
.mk-kan-card.blocked { border-left: 3px solid #c0392b; }
.mk-kan-title { font-weight: 600; line-height: 1.3; margin-bottom: .2rem; color: #1f2a2e; }
.mk-kan-meta { font-size: .72rem; color: #6d7c74; }

/* ---------------- Section label ---------------- */
.mk-section-lab {
  font-size: .78rem; text-transform: uppercase; letter-spacing: .05em;
  color: var(--metis-text-muted); font-weight: 700;
  margin: 4px 0 8px;
}

  </style>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Metis Today — UI kit components (single-file, global scope under Babel)
// Uses window.React globals; exported to window at end of file.

const { useState } = React;

/* ------------------------- TopNav ------------------------- */
function TopNav({ active = "today", onTab }) {
  const tabs = [
    ["today", "bi-sun", "Today"],
    ["knowledge", "bi-book", "Knowledge"],
    ["thinking", "bi-lightbulb", "Thinking"],
    ["planner", "bi-calendar3", "Planner"],
    ["work", "bi-briefcase", "Work"],
    ["meetings", "bi-camera-video", "Meetings"],
    ["learning", "bi-mortarboard", "Learning"],
    ["metis", "bi-robot", "Metis"],
  ];
  return (
    <div className="mk-nav">
      <span className="mk-brand"><i className="bi bi-cpu-fill" style={{ color: "#0071e3" }} />Metis</span>
      <div className="mk-tabs">
        {tabs.map(([id, ic, label]) => (
          <button
            key={id}
            className={"mk-tab " + (active === id ? "active" : "")}
            onClick={() => onTab && onTab(id)}
          >
            <i className={"bi " + ic} /> {label}
          </button>
        ))}
      </div>
      <div className="mk-nav-right">
        <button className="mk-capture"><i className="bi bi-plus-lg" /> Capture</button>
        <span className="mk-trust"><i className="bi bi-shield-check" style={{ color: "#30a46c" }} /> Local-first</span>
      </div>
    </div>
  );
}

/* ------------------------- Morning Brief ------------------------- */
function MorningBrief() {
  return (
    <div className="mk-brief">
      <div className="mk-brief-greet">Good morning, Sander.</div>
      <div className="mk-brief-date">Tuesday 21 April 2026</div>
      <div className="mk-brief-chips">
        <span className="mk-chip ok"><i className="bi bi-check-circle" /> News Radar ran at 07:02</span>
        <span className="mk-chip ok"><i className="bi bi-check-circle" /> Librarian tagged 3 papers</span>
        <span className="mk-chip warn"><i className="bi bi-exclamation-circle" /> 2 tasks overdue</span>
      </div>
      <div className="mk-paper">
        <div className="mk-paper-lab">Today's paper</div>
        Büscher et al. — <em>Passive surveillance sensitivity in post-elimination HAT foci</em>, Lancet Glob Health, April 2026. Relevant to Article 1.
      </div>
    </div>
  );
}

/* ------------------------- Value boxes ------------------------- */
function ValueBoxStrip() {
  const boxes = [
    ["Runs today", "23", "9 agents"],
    ["Tokens today", "412k", "€2.71"],
    ["Open tasks", "8", "2 overdue"],
    ["Active projects", "3", "PhD · HAT · MLM"],
  ];
  return (
    <div className="mk-vbs">
      {boxes.map(([l, v, s]) => (
        <div key={l} className="mk-vb">
          <div className="mk-vb-lab">{l}</div>
          <div className="mk-vb-val">{v}</div>
          <div className="mk-vb-sub">{s}</div>
        </div>
      ))}
    </div>
  );
}

/* ------------------------- Capture bar ------------------------- */
function CaptureBar({ onCapture }) {
  const [text, setText] = useState("");
  const [mode, setMode] = useState("idea");
  const modes = [
    ["idea", "bi-lightbulb", "Idea"],
    ["task", "bi-check2-square", "Task"],
    ["note", "bi-journal-text", "Note"],
    ["ask", "bi-robot", "Ask Metis"],
  ];
  const submit = () => {
    if (!text.trim()) return;
    onCapture && onCapture({ mode, text });
    setText("");
  };
  return (
    <div className="mk-capture-bar">
      <div className="mk-capture-modes">
        {modes.map(([id, ic, lab]) => (
          <button
            key={id}
            className={"mk-mode " + (mode === id ? "active" : "")}
            onClick={() => setMode(id)}
          >
            <i className={"bi " + ic} /> {lab}
          </button>
        ))}
      </div>
      <div className="mk-capture-input">
        <textarea
          rows={2}
          placeholder={
            mode === "ask"
              ? "/metis Review my Article 1 draft for methodology"
              : "Type your " + mode + "…"
          }
          value={text}
          onChange={e => setText(e.target.value)}
          onKeyDown={e => {
            if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) submit();
          }}
        />
        <div className="mk-capture-foot">
          <span className="mk-muted">⌘↵ to capture · routed to {mode === "ask" ? "Metis" : "Today"}</span>
          <button className="mk-btn-primary" onClick={submit}><i className="bi bi-plus-lg" /> Capture</button>
        </div>
      </div>
    </div>
  );
}

  someday: [
    { id: "s1", title: "WHO African trypanosomiasis guideline refresh", tag: "HAT · backlog" },
    { id: "s2", title: "R package: hatmap", tag: "tooling" },

  ],
  active: [
    { id: "a1", title: "HAT Dashboard v1.1", tag: "→ finalize server layer", blocked: true },
    { id: "a2", title: "MLM Course module 3", tag: "→ record demo video" },
  ],
};
const KANBAN_COLS = [
  ["someday", "Someday", "bi-moon-stars"],
  ["incubating", "Incubating", "bi-hourglass-split"],
  ["active", "Active", "bi-lightning-charge"],
];

function ProjectKanban() {
  const [cols, setCols] = useState(KANBAN_INITIAL);
  const nextCol = key => KANBAN_COLS[(KANBAN_COLS.findIndex(c => c[0] === key) + 1) % KANBAN_COLS.length][0];
  const move = (fromKey, id) => {
    const toKey = nextCol(fromKey);
    if (fromKey === toKey) return;
    setCols(prev => {
      const card = prev[fromKey].find(c => c.id === id);
      if (!card) return prev;
      return {
        ...prev,
        [fromKey]: prev[fromKey].filter(c => c.id !== id),
        [toKey]: [...prev[toKey], card],
      };
    });
  };
  return (
    <div className="mk-kanban">
      {KANBAN_COLS.map(([key, title, ic]) => (
        <div key={key} className="mk-kan-col">
          <div className="mk-kan-hd">
            <span><i className={"bi " + ic} /> {title}</span>
            <span className="mk-kan-count">{cols[key].length}</span>
          </div>
          {cols[key].map(card => (
            <div
              key={card.id}
              className={"mk-kan-card" + (card.blocked ? " blocked" : "")}
              onClick={() => move(key, card.id)}
              title="Click to promote"
            >
              <div className="mk-kan-title">{card.title}</div>
              <div className="mk-kan-meta">{card.tag}</div>
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}
