[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Marks
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    e2e: end-to-end tests requiring a browser (Playwright)
    red_line: safety enforcement tests — must always pass
    persona: persona workflow tests

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings
